server {
    listen 80;
    server_name _;

    # NRDP stub: accept any POST and return a valid NRDP success response.
    # The NRDPClient parses: <result><status>0</status><message>…</message></result>
    location /nrdp/server/ {
        add_header Content-Type 'application/xml';
        return 200 '<?xml version="1.0" encoding="utf-8"?><result><status>0</status><message>OK</message></result>';
    }

    # Settings stub: a minimal valid INI file used by the HTTP-settings
    # acceptance tests.  settings_http.hpp downloads this URL and loads it
    # as an INI child instance, so the content just needs to parse.
    #
    # Each test uses a distinct filename (settings_t5.ini, …, settings_t8.ini)
    # so the per-URL cache file doesn't cross-contaminate failure-expected
    # cases — a passing test must not leave a cache entry that lets the
    # next test pass without actually fetching.
    location ~ ^/settings_t[0-9]+\.ini$ {
        add_header Content-Type 'text/plain';
        return 200 '; Test settings served via the http_proxy fixtures.\n[/settings/test]\nproxy_marker=ok\n';
    }

    # Catch-all so the container does not return 404 for health probes
    location / {
        return 200 'nrdp-origin\n';
        add_header Content-Type 'text/plain';
    }
}
