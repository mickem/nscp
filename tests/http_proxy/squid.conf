# =============================================================================
# Squid proxy configuration for http_proxy acceptance tests
#
# Port 3128 — open proxy, no authentication required
# Port 3129 — requires HTTP Basic authentication (testuser / testpass)
# =============================================================================

# Listening ports
http_port 3128
http_port 3129

# ---- Basic authentication (used only on port 3129) --------------------------
auth_param basic program /usr/lib/squid/basic_ncsa_auth /etc/squid/htpasswd
auth_param basic realm "Proxy Authentication Required"
auth_param basic credentialsttl 2 minutes

# ---- ACLs -------------------------------------------------------------------
acl authenticated proxy_auth REQUIRED
acl port_open    localport 3128
acl port_auth    localport 3129

# Allow CONNECT tunnelling so HTTPS tests can pass through
acl CONNECT      method CONNECT

# ---- Access rules -----------------------------------------------------------
# Port 3128: allow all requests without authentication
http_access allow port_open

# Port 3129: require valid credentials
http_access allow port_auth authenticated

# Deny everything else
http_access deny all

# ---- Logging ----------------------------------------------------------------
access_log stdio:/dev/stdout
cache_log  stdio:/dev/stderr

# ---- Disable on-disk caching ------------------------------------------------
cache deny all
