# Minimal collectd config for the integration test: receive value-lists over
# the binary network protocol and write each one to a CSV file the test can
# read back. See collectd.Dockerfile for the surrounding context.

Hostname "receiver"
FQDNLookup false
Interval 1

LoadPlugin network
LoadPlugin csv

# Receive unsigned/plaintext value-lists on the default collectd UDP port.
# SecurityLevel defaults to None, which matches NSClient++'s (unsigned) sender.
<Plugin network>
  Listen "0.0.0.0" "25826"
</Plugin>

# One file per value-list under /data/<host>/<plugin-instance>/<type-instance>.
# StoreRates false keeps raw DERIVE/GAUGE values so a single sample produces a
# data line (no rate computation that would need two samples).
<Plugin csv>
  DataDir "/data"
  StoreRates false
</Plugin>
