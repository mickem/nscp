module: GraphiteClient
namespace: client
platforms:
- unix
unix:
  info:
    description: Graphite client can be used to submit graph data to a graphite graphing system
    title: GraphiteClient
  paths:
    /settings/graphite/client:
      info:
        advanced: false
        description: Section for graphite passive check module.
        subkey: false
        title: GRAPHITE CLIENT SECTION
      keys:
        channel:
          advanced: false
          default_value: GRAPHITE
          description: The channel to listen to.
          sample: false
          title: CHANNEL
        hostname:
          advanced: false
          default_value: auto
          description: "The host name of the monitored computer.\nSet this to auto (default) to use the\
            \ windows name of the computer.\n\nauto\tHostname\n${host}\tHostname\n${host_lc}\nHostname\
            \ in lowercase\n${host_uc}\tHostname in uppercase\n${domain}\tDomainname\n${domain_lc}\tDomainname\
            \ in lowercase\n${domain_uc}\tDomainname in uppercase\n"
          sample: false
          title: HOSTNAME
    /settings/graphite/client/handlers:
      info:
        advanced: false
        description: ''
        subkey: true
        title: CLIENT HANDLER SECTION
    /settings/graphite/client/targets:
      info:
        advanced: false
        description: ''
        subkey: true
        title: REMOTE TARGET DEFINITIONS
      sample:
        keys:
          address:
            advanced: false
            default_value: ''
            description: Target host address
            sample: true
            title: TARGET ADDRESS
          allowed ciphers:
            advanced: false
            default_value: ALL:!ADH:!LOW:!EXP:!MD5:@STRENGTH
            description: OpenSSL cipher list.
            sample: true
            title: ALLOWED CIPHERS
          ca:
            advanced: false
            default_value: ${ca-path}
            description: Certificate authority bundle used to verify the server certificate.
            sample: true
            title: CA
          certificate:
            advanced: false
            default_value: ''
            description: Optional client certificate for mutual TLS.
            sample: true
            title: CLIENT CERTIFICATE
          certificate format:
            advanced: false
            default_value: PEM
            description: Format of the client certificate/key (PEM or DER).
            sample: true
            title: CERTIFICATE FORMAT
          certificate key:
            advanced: false
            default_value: ''
            description: Private key for the client certificate (if not bundled in the certificate file).
            sample: true
            title: CLIENT CERTIFICATE KEY
          host:
            advanced: true
            default_value: ''
            description: The target server to report results to.
            sample: true
            title: TARGET HOST
          path:
            advanced: false
            default_value: ''
            description: Path mapping for metrics
            sample: true
            title: PATH FOR METRICS
          port:
            advanced: true
            default_value: ''
            description: The target server port
            sample: true
            title: TARGET PORT
          retries:
            advanced: false
            default_value: '3'
            description: Number of times to retry sending.
            sample: true
            title: RETRIES
          send perfdata:
            advanced: false
            default_value: ''
            description: Send performance data to this server
            sample: true
            title: SEND PERF DATA
          send status:
            advanced: false
            default_value: ''
            description: Send status data to this server
            sample: true
            title: SEND STATUS
          ssl:
            advanced: false
            default_value: 'false'
            description: Encrypt the connection with TLS. Carbon does not speak TLS itself - point this
              at a TLS-terminating proxy in front of carbon.
            sample: true
            title: ENABLE TLS
          status path:
            advanced: false
            default_value: ''
            description: Path mapping for status
            sample: true
            title: PATH FOR STATUS
          timeout:
            advanced: false
            default_value: '30'
            description: Timeout (in seconds) when reading/writing packets to/from sockets.
            sample: true
            title: TIMEOUT
          tls version:
            advanced: false
            default_value: 1.2+
            description: The TLS version to use (1.0, 1.1, 1.2, 1.2+ or 1.3).
            sample: true
            title: TLS VERSION
          verify mode:
            advanced: false
            default_value: peer
            description: 'How to verify the server certificate: ''peer'' (default) / ''peer-cert'' validate
              the chain and hostname; ''none'' disables verification (insecure).'
            sample: true
            title: VERIFY MODE
  queries:
    submit_graphite:
      info:
        description: Submit information to the remote Graphite server.
      params:
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (this screen)
        name: help
        repeatable: false
        required: false
        short_description: Show help screen (this screen)
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen as a protocol buffer payload
        name: help-pb
        repeatable: false
        required: false
        short_description: Show help screen as a protocol buffer payload
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show default values for a given command
        name: show-default
        repeatable: false
        required: false
        short_description: Show default values for a given command
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (short format).
        name: help-short
        repeatable: false
        required: false
        short_description: Show help screen (short format).
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: The host of the host running the server
        name: host
        repeatable: false
        required: false
        short_description: The host of the host running the server
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: The port of the host running the server
        name: port
        repeatable: false
        required: false
        short_description: The port of the host running the server
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: The address (host:port) of the host running the server
        name: address
        repeatable: false
        required: false
        short_description: The address (host:port) of the host running the server
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Number of seconds before connection times out (default=10)
        name: timeout
        repeatable: false
        required: false
        short_description: Number of seconds before connection times out (default=10)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Target to use (lookup connection info from config)
        name: target
        repeatable: false
        required: false
        short_description: Target to use (lookup connection info from config)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Number of times ti retry a failed connection attempt (default=2)
        name: retry
        repeatable: false
        required: false
        short_description: Number of times ti retry a failed connection attempt (default=2)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: legacy version of retry
        name: retries
        repeatable: false
        required: false
        short_description: legacy version of retry
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Source/sender host name (default is auto which means use the name of the actual
          host)
        name: source-host
        repeatable: false
        required: false
        short_description: Source/sender host name (default is auto which means use the name of the actual
          host)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Source/sender host name (default is auto which means use the name of the actual
          host)
        name: sender-host
        repeatable: false
        required: false
        short_description: Source/sender host name (default is auto which means use the name of the actual
          host)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: The name of the command that the remote daemon should run
        name: command
        repeatable: false
        required: false
        short_description: The name of the command that the remote daemon should run
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Same as command
        name: alias
        repeatable: false
        required: false
        short_description: Same as command
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Message
        name: message
        repeatable: false
        required: false
        short_description: Message
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Result code either a number or OK, WARN, CRIT, UNKNOWN
        name: result
        repeatable: false
        required: false
        short_description: Result code either a number or OK, WARN, CRIT, UNKNOWN
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Separator to use for the batch command (default is |)
        name: separator
        repeatable: false
        required: false
        short_description: Separator to use for the batch command (default is |)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: 'Add multiple records using the separator format is: command|result|message'
        name: batch
        repeatable: false
        required: false
        short_description: 'Add multiple records using the separator format is: command|result|message'
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: ''
        name: path
        repeatable: false
        required: false
        short_description: ''
