module: CheckEventLog
namespace: windows
platforms:
- windows
windows:
  info:
    description: Check for errors and warnings in the event log.
    title: CheckEventLog
  paths:
    /settings/eventlog:
      info:
        advanced: false
        description: Section for the EventLog Checker (CheckEventLog.dll).
        subkey: false
        title: Eventlog
      keys:
        buffer size:
          advanced: false
          default_value: '131072'
          description: The size of the buffer to use when getting messages this affects the speed and
            maximum size of messages you can receive.
          sample: false
          title: Default buffer size
        debug:
          advanced: false
          default_value: 'false'
          description: Log more information when filtering (useful to detect issues with filters) not
            useful in production as it is a bit of a resource hog.
          sample: false
          title: Enable debugging
        lookup names:
          advanced: false
          default_value: 'true'
          description: Lookup the names of eventlog files
          sample: false
          title: Lookup eventlog names
        syntax:
          advanced: false
          default_value: ''
          description: Set this to use a specific syntax string for all commands (that don't specify one).
          sample: false
          title: Default syntax
    /settings/eventlog/real-time:
      info:
        advanced: false
        description: A set of options to configure the real time checks
        subkey: false
        title: Real-time eventlog monitoring
      keys:
        debug:
          advanced: false
          default_value: 'false'
          description: Log missed records (useful to detect issues with filters) not useful in production
            as it is a bit of a resource hog.
          sample: false
          title: Enable debugging
        enabled:
          advanced: false
          default_value: 'false'
          description: Spawns a background thread which detects issues and reports them back instantly.
          sample: false
          title: Enable realtime monitoring
        log:
          advanced: false
          default_value: application,system
          description: Comma separated list of logs to check
          sample: false
          title: Logs to check
        startup age:
          advanced: false
          default_value: 30m
          description: The initial age to scan when starting NSClient++
          sample: false
          title: Read old records at startup
    /settings/eventlog/real-time/filters:
      info:
        advanced: false
        description: A set of filters to use in real-time mode
        subkey: true
        title: Real-time eventlog filters
      sample:
        keys:
          command:
            advanced: true
            default_value: ''
            description: The name of the command (think nagios service name) to report up stream (defaults
              to alias if not set)
            sample: true
            title: COMMAND NAME
          critical:
            advanced: false
            default_value: ''
            description: If any rows match this filter severity will escalated to CRITICAL
            sample: true
            title: CRITICAL FILTER
          debug:
            advanced: true
            default_value: ''
            description: Enable this to display debug information for this match filter
            sample: true
            title: DEBUG
          destination:
            advanced: true
            default_value: ''
            description: The destination for intercepted messages
            sample: true
            title: DESTINATION
          detail syntax:
            advanced: true
            default_value: ''
            description: Format string for dates
            sample: true
            title: SYNTAX
          empty message:
            advanced: true
            default_value: eventlog found no records
            description: The message to display if nothing matches the filter (generally considered the
              ok state).
            sample: true
            title: EMPTY MESSAGE
          escape html:
            advanced: true
            default_value: ''
            description: Escape HTML characters (< and >).
            sample: true
            title: ESCAPE HTML
          filter:
            advanced: false
            default_value: ''
            description: Scan files for matching rows for each matching rows an OK message will be submitted
            sample: true
            title: FILTER
          log:
            advanced: false
            default_value: ''
            description: The eventlog record to filter on (if set to 'all' means all enabled logs)
            sample: true
            title: FILE
          logs:
            advanced: true
            default_value: ''
            description: The eventlog record to filter on (if set to 'all' means all enabled logs)
            sample: true
            title: FILES
          maximum age:
            advanced: false
            default_value: 5m
            description: 'How long before reporting "ok".

              If this is set to "false" no periodic ok messages will be reported only errors.'
            sample: true
            title: MAXIMUM AGE
          ok:
            advanced: false
            default_value: ''
            description: If any rows match this filter severity will escalated down to OK
            sample: true
            title: OK FILTER
          ok syntax:
            advanced: true
            default_value: ''
            description: Format string for dates
            sample: true
            title: SYNTAX
          perf config:
            advanced: true
            default_value: ''
            description: Performance data configuration
            sample: true
            title: PERF CONFIG
          severity:
            advanced: true
            default_value: ''
            description: THe severity of this message (OK, WARNING, CRITICAL, UNKNOWN)
            sample: true
            title: SEVERITY
          silent period:
            advanced: false
            default_value: 'false'
            description: 'How long before a new alert is reported after an alert is reported. In other
              words whenever an alert is fired and a notification is sent the same notification will not
              be sent again until this period has ended.

              If this is set to "false" no periodic ok messages will be reported only errors.'
            sample: true
            title: Silent period
          source id:
            advanced: true
            default_value: ''
            description: The name of the source system, will automatically use the remote system if a
              remote system is called. Almost most sending systems will replace this with current systems
              hostname if not present. So use this only if you need specific source systems for specific
              schedules and not calling remote systems.
            sample: true
            title: SOURCE ID
          target:
            advanced: false
            default_value: ''
            description: Same as destination
            sample: true
            title: DESTINATION
          target id:
            advanced: true
            default_value: ''
            description: The target to send the message to (will be resolved by the consumer)
            sample: true
            title: TARGET ID
          top syntax:
            advanced: true
            default_value: ''
            description: Format string for dates
            sample: true
            title: SYNTAX
          truncate:
            advanced: true
            default_value: ''
            description: Truncate the eventlog messages, if set to 0 (default) messages will not be truncated
            sample: true
            title: Truncate
          warning:
            advanced: false
            default_value: ''
            description: If any rows match this filter severity will escalated to WARNING
            sample: true
            title: WARNING FILTER
  queries:
    check_eventlog:
      fields:
      - generic: false
        long_description: TODO
        name: category
        short_description: ''
      - generic: false
        long_description: Which computer generated the message
        name: computer
        short_description: ''
      - generic: true
        long_description: Number of items matching the filter. Common option for all checks.
        name: count
        short_description: ''
      - generic: true
        long_description: Number of items matched the critical criteria. Common option for all checks.
        name: crit_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the critical criteria. Common option for all
          checks.
        name: crit_list
        short_description: ''
      - generic: false
        long_description: TODO
        name: customer
        short_description: ''
      - generic: true
        long_description: A special list with critical, then warning and finally ok. Common option for
          all checks.
        name: detail_list
        short_description: ''
      - generic: false
        long_description: The logfile name
        name: file
        short_description: ''
      - generic: false
        long_description: The logfile name
        name: guid
        short_description: ''
      - generic: false
        long_description: Eventlog id
        name: id
        short_description: ''
      - generic: false
        long_description: The keyword associated with this event
        name: keyword
        short_description: ''
      - generic: false
        long_description: Severity level (error, warning, info, success, auditSuccess, auditFailure)
        name: level
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the filter. Common option for all checks.
        name: list
        short_description: ''
      - generic: false
        long_description: alias for file
        name: log
        short_description: ''
      - generic: false
        long_description: The message rendered as a string.
        name: message
        short_description: ''
      - generic: true
        long_description: Number of items matched the ok criteria. Common option for all checks.
        name: ok_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the ok criteria. Common option for all checks.
        name: ok_list
        short_description: ''
      - generic: false
        long_description: The opcode associated with this event
        name: opcode
        short_description: ''
      - generic: true
        long_description: Number of items matched either warning or critical criteria. Common option for
          all checks.
        name: problem_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched either the critical or the warning criteria.
          Common option for all checks.
        name: problem_list
        short_description: ''
      - generic: false
        long_description: Source system.
        name: provider
        short_description: ''
      - generic: false
        long_description: Raw message id (contains many other fields all baked into a single number)
        name: rawid
        short_description: ''
      - generic: false
        long_description: Alias for user (the event's account SID)
        name: sid
        short_description: ''
      - generic: false
        long_description: Source system.
        name: source
        short_description: ''
      - generic: true
        long_description: The returned status (OK/WARN/CRIT/UNKNOWN). Common option for all checks.
        name: status
        short_description: ''
      - generic: false
        long_description: The type of event (task)
        name: task
        short_description: ''
      - generic: true
        long_description: Total number of items. Common option for all checks.
        name: total
        short_description: ''
      - generic: false
        long_description: alias for level (old, deprecated)
        name: type
        short_description: ''
      - generic: false
        long_description: SID of the account associated with the event (e.g. S-1-5-18); empty on the legacy
          API. Enables filtering by SID.
        name: user
        short_description: ''
      - generic: true
        long_description: Number of items matched the warning criteria. Common option for all checks.
        name: warn_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the warning criteria. Common option for all
          checks.
        name: warn_list
        short_description: ''
      - generic: false
        long_description: When the message was written to file
        name: written
        short_description: ''
      - generic: false
        long_description: When the message was written to file as an absolute date string
        name: written_str
        short_description: ''
      - generic: false
        long_description: Get event as XML message.
        name: xml
        short_description: ''
      info:
        description: Check for errors in the event log.
      params:
      - content_type: 2
        default_value: level in ('warning', 'error', 'critical')
        is_simple: false
        long_description: 'Filter which marks interesting items.

          Interesting items are items which will be included in the check.

          They do not denote warning or critical state instead it defines which items are relevant and
          you can remove unwanted items.'
        name: filter
        repeatable: false
        required: false
        short_description: Filter which marks interesting items.
      - content_type: 2
        default_value: level = 'warning', problem_count > 0
        is_simple: false
        long_description: 'Filter which marks items which generates a warning state.

          If anything matches this filter the return status will be escalated to warning.

          '
        name: warning
        repeatable: false
        required: false
        short_description: Filter which marks items which generates a warning state.
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Short alias for warning
        name: warn
        repeatable: false
        required: false
        short_description: Short alias for warning
      - content_type: 2
        default_value: level in ('error', 'critical')
        is_simple: false
        long_description: 'Filter which marks items which generates a critical state.

          If anything matches this filter the return status will be escalated to critical.

          '
        name: critical
        repeatable: false
        required: false
        short_description: Filter which marks items which generates a critical state.
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Short alias for critical.
        name: crit
        repeatable: false
        required: false
        short_description: Short alias for critical.
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'Filter which marks items which generates an ok state.

          If anything matches this any previous state for this item will be reset to ok.'
        name: ok
        repeatable: false
        required: false
        short_description: Filter which marks items which generates an ok state.
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show debugging information in the log
        name: debug
        repeatable: false
        required: false
        short_description: Show debugging information in the log
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show details for all matches regardless of status (normally details are only
          showed for warnings and criticals).
        name: show-all
        repeatable: false
        required: false
        short_description: Show details for all matches regardless of status (normally details are only
          showed for warnings and criticals).
      - content_type: 2
        default_value: ok
        is_simple: false
        long_description: 'Return status to use when nothing matched filter.

          If no filter is specified this will never happen unless the file is empty.'
        name: empty-state
        repeatable: false
        required: false
        short_description: Return status to use when nothing matched filter.
      - content_type: 2
        default_value: level(ignored:true)
        is_simple: false
        long_description: 'Performance data generation configuration

          TODO: obj ( key: value; key: value) obj (key:valuer;key:value)'
        name: perf-config
        repeatable: false
        required: false
        short_description: Performance data generation configuration
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Escape any < and > characters to prevent HTML encoding
        name: escape-html
        repeatable: false
        required: false
        short_description: Escape any < and > characters to prevent HTML encoding
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (this screen)
        name: help
        repeatable: false
        required: false
        short_description: Show help screen (this screen)
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen as a protocol buffer payload
        name: help-pb
        repeatable: false
        required: false
        short_description: Show help screen as a protocol buffer payload
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show default values for a given command
        name: show-default
        repeatable: false
        required: false
        short_description: Show default values for a given command
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (short format).
        name: help-short
        repeatable: false
        required: false
        short_description: Show help screen (short format).
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'Unique syntax.

          Used to filter unique items (counted will still increase but messages will not repeated)'
        name: unique-index
        repeatable: false
        required: false
        short_description: Unique syntax.
      - content_type: 2
        default_value: '${status}: ${count} message(s) ${problem_list}'
        is_simple: false
        long_description: 'Top level syntax.

          Used to format the message to return can include text as well as special keywords which will
          include information from the checks.

          To add a keyword to the message you can use two syntaxes either ${keyword} or %(keyword) (there
          is no difference between them apart from ${} can be difficult to escape on linux).'
        name: top-syntax
        repeatable: false
        required: false
        short_description: Top level syntax.
      - content_type: 2
        default_value: '%(status): Event log seems fine'
        is_simple: false
        long_description: 'ok syntax.

          DEPRECATED! This is the syntax for when an ok result is returned.

          This value will not be used if your syntax contains %(list) or %(count).'
        name: ok-syntax
        repeatable: false
        required: false
        short_description: ok syntax.
      - content_type: 2
        default_value: '%(status): No entries found'
        is_simple: false
        long_description: 'Empty syntax.

          DEPRECATED! This is the syntax for when nothing matches the filter.'
        name: empty-syntax
        repeatable: false
        required: false
        short_description: Empty syntax.
      - content_type: 2
        default_value: ${file} ${source} (${message})
        is_simple: false
        long_description: 'Detail level syntax.

          Used to format each resulting item in the message.

          %(list) will be replaced with all the items formatted by this syntax string in the top-syntax.

          To add a keyword to the message you can use two syntaxes either ${keyword} or %(keyword) (there
          is no difference between them apart from ${} can be difficult to escape on linux).'
        name: detail-syntax
        repeatable: false
        required: false
        short_description: Detail level syntax.
      - content_type: 2
        default_value: ${file}_${source}
        is_simple: false
        long_description: 'Performance alias syntax.

          This is the syntax for the base names of the performance data.'
        name: perf-syntax
        repeatable: false
        required: false
        short_description: Performance alias syntax.
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'File to read (can be specified multiple times to check multiple files.

          Notice that specifying multiple files will create an aggregate set you will not check each file
          individually.In other words if one file contains an error the entire check will result in error.'
        name: file
        repeatable: false
        required: false
        short_description: File to read (can be specified multiple times to check multiple files.
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Same as file
        name: log
        repeatable: false
        required: false
        short_description: Same as file
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'Date range to scan.

          A negative value (e.g. -1h) scans backward through historical events; a positive value (e.g.
          +1h) scans forward into future events. The value is a relative offset from now using the suffixes
          s (seconds), m (minutes), h (hours), d (days) or w (weeks); a bare number is treated as seconds.
          This is used as an approximate time window to limit how far the scan walks the log and significantly
          speeds up large logs, but messages are not guaranteed to be returned in order. Defaults to -24h
          when omitted.'
        name: scan-range
        repeatable: false
        required: false
        short_description: Date range to scan.
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Maximum length of message for each event log message text.
        name: truncate-message
        repeatable: false
        required: false
        short_description: Maximum length of message for each event log message text.
      - content_type: 2
        default_value: '1'
        is_simple: false
        long_description: 'Shorthand for setting default unique index: ${log}-${source}-${id}.'
        name: unique
        repeatable: false
        required: false
        short_description: 'Shorthand for setting default unique index: ${log}-${source}-${id}.'
      - content_type: 2
        default_value: auto
        is_simple: false
        long_description: Use bookmarks to only look for messages since last check (with the same bookmark
          name). If you set this to auto or leave it empty the bookmark name will be derived from your
          logs, filters, warn and crit.
        name: bookmark
        repeatable: false
        required: false
        short_description: Use bookmarks to only look for messages since last check (with the same bookmark
          name). If you set this to auto or leave it empty the bookmark name will be derived from your
          logs, filters, warn and crit.
