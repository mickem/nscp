module: WEBServer
namespace: generic
platforms:
- unix
unix:
  info:
    description: A server that listens for incoming HTTP connection and processes incoming requests. It
      provides both a WEB UI as well as a REST API in addition to simplifying configuration of WEB Server
      module.
    title: WEBServer
  paths:
    /settings/WEB/server:
      info:
        advanced: false
        description: Section for WEB (WEBServer.dll) (check_WEB) protocol options.
        subkey: false
        title: Web server
      keys:
        allow anonymous access:
          advanced: false
          default_value: 'false'
          description: When false (the default) any role named `anonymous` registered via /settings/WEB/server/roles
            is ignored and the WEB server never answers an unauthenticated request. Set to true only if
            you intentionally want to expose endpoints (via the `anonymous` role grants) without authentication.
          sample: false
          title: ALLOW ANONYMOUS ACCESS
        allow insecure:
          advanced: false
          default_value: 'false'
          description: When false (the default) the WEB server refuses to start if the TLS certificate
            is missing, rather than silently serving HTTP in clear. Set to true to explicitly accept unencrypted
            HTTP when no certificate is present - session tokens and Basic-auth credentials will then
            be transmitted unencrypted, so only do this behind a TLS-terminating proxy or on a trusted
            loopback interface.
          sample: false
          title: ALLOW INSECURE (CLEARTEXT HTTP)
        allowed hosts:
          advanced: false
          default_value: 127.0.0.1
          description: A comma separated list of allowed hosts. You can use netmasks (/ syntax) or * to
            create ranges.
          sample: false
          title: Allowed hosts
        auth rate limit block seconds:
          advanced: false
          default_value: '60'
          description: How long an IP stays blocked after hitting `auth rate limit max failures` consecutive
            failures. Default 60 s.
          sample: false
          title: AUTH RATE LIMIT (BLOCK SECONDS)
        auth rate limit max failures:
          advanced: false
          default_value: '10'
          description: How many consecutive failed authentication attempts from one client IP trigger
            the block. Default 10. Set to 0 to disable the limiter entirely (useful for integration test
            harnesses that intentionally probe failed auth).
          sample: false
          title: AUTH RATE LIMIT (FAILURES)
        cache allowed hosts:
          advanced: false
          default_value: 'true'
          description: If host names (DNS entries) should be cached, improves speed and security somewhat
            but won't allow you to have dynamic IPs for your Nagios server.
          sample: false
          title: Cache list of allowed hosts
        certificate:
          advanced: false
          default_value: ${certificate-path}/certificate.pem
          description: Ssl certificate to use for the ssl server
          sample: false
          title: TLS Certificate
        certificate key:
          advanced: false
          default_value: ''
          description: The private key for the certificate if not in the same file
          sample: false
          title: TLS private key
        disable admin user:
          advanced: false
          default_value: 'false'
          description: When true, suppress the built-in `admin` user entirely. The default admin is not
            seeded on first boot, any pre-existing `admin` entry in /settings/WEB/server/users is ignored
            at load time, and the fallback that auto-creates admin when no users are configured is skipped.
            Use this when you want the WEB server up for monitoring (queries, metrics, anonymous endpoints)
            but do NOT want any account that can remotely reconfigure the host - even if credentials are
            compromised. Define your own read-only users under /settings/WEB/server/users (or rely on
            `allow anonymous access` with a tightly-scoped `anonymous` role) so something remains callable.
          sample: false
          title: DISABLE ADMIN USER
        legacy query auth user agents:
          advanced: false
          default_value: Icinga/check_nscp_api
          description: Comma-separated list of User-Agent substrings (case-insensitive) for clients allowed
            to authenticate via the legacy `?password=...` / `?TOKEN=...` query-string mechanism. The
            fallback was removed for security in 340b8db1 because URL parameters leak into browser history,
            proxy logs and Referer headers. Defaults to 'Icinga/check_nscp_api' so Icinga's bundled check_nscp_api
            plugin keeps working without admitting any other client that happens to mention Icinga in
            its User-Agent. Set to empty string to disable the fallback entirely.
          sample: false
          title: LEGACY QUERY-STRING AUTH ALLOWLIST
        password:
          advanced: false
          default_value: ''
          description: Password used to authenticate against server
          sample: false
          title: Password
        port:
          advanced: false
          default_value: '8443'
          description: Port to use for WEB server.
          sample: false
          title: Server port
        threads:
          advanced: false
          default_value: '10'
          description: The number of threads in the sever response pool.
          sample: false
          title: Server threads
    /settings/WEB/server/log:
      info:
        advanced: false
        description: Configure which messages from the web server are logged.
        subkey: false
        title: Log configuration
      keys:
        debug:
          advanced: false
          default_value: 'false'
          description: Enable logging of debug messages from the web server.
          sample: false
          title: Log debug
        error:
          advanced: false
          default_value: 'true'
          description: Enable logging of errors from the web server.
          sample: false
          title: Log errors
        info:
          advanced: false
          default_value: 'false'
          description: Enable logging of info messages from the web server.
          sample: false
          title: Log info
    /settings/WEB/server/roles:
      info:
        advanced: false
        description: A list of roles and with coma separated list of access rights.
        subkey: false
        title: Web server roles
      keys:
        client:
          advanced: false
          default_value: public,info.get,info.get.version,queries.list,queries.get,queries.execute,aliases.list,login.get,modules.list
          description: Default role for read only
          sample: false
          title: Role for read only
        full:
          advanced: false
          default_value: '*'
          description: Default role for Full access
          sample: false
          title: Role for Full access
        legacy:
          advanced: false
          default_value: legacy,login.get
          description: Default role for legacy API
          sample: false
          title: Role for legacy API
        monitoring:
          advanced: false
          default_value: public,queries.execute,aliases.list,login.get,metrics.get
          description: Default role for checks and queries only
          sample: false
          title: Role for checks and queries only
    /settings/WEB/server/users:
      info:
        advanced: false
        description: Users which can access the REST API
        subkey: true
        title: Web server users
      sample:
        keys:
          alias:
            advanced: true
            default_value: ''
            description: The alias (service name) to report to server
            sample: false
            title: ALIAS
          is template:
            advanced: true
            default_value: 'false'
            description: Declare this object as a template (this means it will not be available as a separate
              object)
            sample: false
            title: IS TEMPLATE
          parent:
            advanced: true
            default_value: default
            description: The parent the target inherits from
            sample: false
            title: PARENT
          password:
            advanced: false
            default_value: ''
            description: The password to use.
            sample: true
            title: PASSWORD
          role:
            advanced: false
            default_value: ''
            description: The role which will grant access to this user
            sample: true
            title: ROLE
    /settings/default:
      info:
        advanced: false
        description: Default values used in other config sections.
        subkey: false
        title: Default values
      keys:
        allowed hosts:
          advanced: false
          default_value: 127.0.0.1
          description: A comma separated list of allowed hosts. You can use netmasks (/ syntax) or * to
            create ranges.
          sample: false
          title: Allowed hosts
        bind to:
          advanced: false
          default_value: ''
          description: Allows you to bind server to a specific local address. This has to be a dotted
            ip address not a host name. Leaving this blank will bind to all available IP addresses.
          sample: false
          title: BIND TO ADDRESS
        cache allowed hosts:
          advanced: false
          default_value: 'true'
          description: If host names (DNS entries) should be cached, improves speed and security somewhat
            but won't allow you to have dynamic IPs for your Nagios server.
          sample: false
          title: Cache list of allowed hosts
        encoding:
          advanced: true
          default_value: ''
          description: ''
          sample: false
          title: NRPE PAYLOAD ENCODING
        inbox:
          advanced: false
          default_value: inbox
          description: The default channel to post incoming messages on
          sample: false
          title: INBOX
        password:
          advanced: false
          default_value: ''
          description: Password used to authenticate against server
          sample: false
          title: Password
        socket queue size:
          advanced: true
          default_value: '0'
          description: Number of sockets to queue before starting to refuse new incoming connections.
            This can be used to tweak the amount of simultaneous sockets that the server accepts.
          sample: false
          title: LISTEN QUEUE
        thread pool:
          advanced: true
          default_value: '10'
          description: ''
          sample: false
          title: THREAD POOL
        timeout:
          advanced: false
          default_value: '30'
          description: Timeout (in seconds) when reading packets on incoming sockets. If the data has
            not arrived within this time we will bail out.
          sample: false
          title: TIMEOUT
        timezone:
          advanced: true
          default_value: local
          description: Timezone used to render dates such as boot time. Accepts 'local' (default), 'utc',
            or any POSIX TZ string parseable by Boost.Date_time (e.g. 'MST-07' or 'EST-05EDT,M3.2.0,M11.1.0').
          sample: false
          title: Timezone
