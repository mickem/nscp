module: NRPEClient
namespace: client
platforms:
- unix
unix:
  info:
    description: NRPE client can be used both from command line and from queries to check remote systems
      via NRPE as well as configure the NRPE server
    title: NRPEClient
  paths:
    /settings/NRPE/client:
      info:
        advanced: false
        description: Section for NRPE active/passive check module.
        subkey: false
        title: NRPE CLIENT SECTION
      keys:
        channel:
          advanced: false
          default_value: NRPE
          description: The channel to listen to.
          sample: false
          title: CHANNEL
    /settings/NRPE/client/handlers:
      info:
        advanced: false
        description: ''
        subkey: true
        title: CLIENT HANDLER SECTION
    /settings/NRPE/client/targets:
      info:
        advanced: false
        description: ''
        subkey: true
        title: REMOTE TARGET DEFINITIONS
      sample:
        keys:
          address:
            advanced: false
            default_value: ''
            description: Target host address
            sample: true
            title: TARGET ADDRESS
          allowed ciphers:
            advanced: false
            default_value: ''
            description: 'A better value is: ALL:!ADH:!LOW:!EXP:!MD5:@STRENGTH'
            sample: true
            title: ALLOWED CIPHERS
          ca:
            advanced: true
            default_value: ''
            description: ''
            sample: true
            title: CA
          certificate:
            advanced: false
            default_value: ''
            description: ''
            sample: true
            title: SSL CERTIFICATE
          certificate format:
            advanced: true
            default_value: ''
            description: ''
            sample: true
            title: CERTIFICATE FORMAT
          certificate key:
            advanced: true
            default_value: ''
            description: ''
            sample: true
            title: SSL CERTIFICATE
          dh:
            advanced: true
            default_value: ''
            description: ''
            sample: true
            title: DH KEY
          host:
            advanced: true
            default_value: ''
            description: The target server to report results to.
            sample: true
            title: TARGET HOST
          insecure:
            advanced: false
            default_value: ''
            description: Use insecure legacy mode to connect to old NRPE server
            sample: true
            title: Insecure legacy mode
          payload length:
            advanced: false
            default_value: ''
            description: Length of payload to/from the NRPE agent. This is a hard specific value so you
              have to "configure" (read recompile) your NRPE agent to use the same value for it to work.
            sample: true
            title: PAYLOAD LENGTH
          port:
            advanced: true
            default_value: ''
            description: The target server port
            sample: true
            title: TARGET PORT
          retries:
            advanced: false
            default_value: '3'
            description: Number of times to retry sending.
            sample: true
            title: RETRIES
          timeout:
            advanced: false
            default_value: '30'
            description: Timeout (in seconds) when reading/writing packets to/from sockets.
            sample: true
            title: TIMEOUT
          use ssl:
            advanced: false
            default_value: ''
            description: This option controls if SSL should be enabled.
            sample: true
            title: ENABLE SSL ENCRYPTION
          verify mode:
            advanced: false
            default_value: ''
            description: ''
            sample: true
            title: VERIFY MODE
          version:
            advanced: false
            default_value: ''
            description: The NRPE Version to use (2 or 4).
            sample: true
            title: Version
  queries:
    check_nrpe:
      info:
        description: Request remote information via NRPE.
      params:
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (this screen)
        name: help
        repeatable: false
        required: false
        short_description: Show help screen (this screen)
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen as a protocol buffer payload
        name: help-pb
        repeatable: false
        required: false
        short_description: Show help screen as a protocol buffer payload
      - content_type: 4
        default_value: ''
        is_simple: true
