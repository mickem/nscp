common:
  info:
    description: NSCA-NG client can be used both from command line and from queries to submit passive
      checks via NSCA-NG (TLS-based NSCA next generation)
    title: NSCANgClient
  paths:
    /settings/NSCA-NG/client:
      info:
        advanced: false
        description: Section for NSCA-NG passive check module.
        subkey: false
        title: NSCA-NG CLIENT SECTION
      keys:
        channel:
          advanced: false
          default_value: NSCA-NG
          description: The channel to listen to.
          sample: false
          title: CHANNEL
        hostname:
          advanced: false
          default_value: auto
          description: "The host name of the monitored computer.\nSet this to auto (default) to use the\
            \ windows name of the computer.\n\nauto\tHostname\n${host}\tHostname\n${host_lc}\nHostname\
            \ in lowercase\n${host_uc}\tHostname in uppercase\n${domain}\tDomainname\n${domain_lc}\tDomainname\
            \ in lowercase\n${domain_uc}\tDomainname in uppercase\n"
          sample: false
          title: HOSTNAME
    /settings/NSCA-NG/client/handlers:
      info:
        advanced: false
        description: ''
        subkey: true
        title: CLIENT HANDLER SECTION
    /settings/NSCA-NG/client/targets:
      info:
        advanced: false
        description: ''
        subkey: true
        title: REMOTE TARGET DEFINITIONS
      sample:
        keys:
          address:
            advanced: false
            default_value: ''
            description: Target host address
            sample: true
            title: TARGET ADDRESS
          allowed ciphers:
            advanced: false
            default_value: ''
            description: 'A better value is: ALL:!ADH:!LOW:!EXP:!MD5:@STRENGTH'
            sample: true
            title: ALLOWED CIPHERS
          ca:
            advanced: true
            default_value: ''
            description: ''
            sample: true
            title: CA
          certificate:
            advanced: false
            default_value: ''
            description: ''
            sample: true
            title: SSL CERTIFICATE
          certificate format:
            advanced: true
            default_value: ''
            description: ''
            sample: true
            title: CERTIFICATE FORMAT
          certificate key:
            advanced: true
            default_value: ''
            description: ''
            sample: true
            title: SSL CERTIFICATE
          dh:
            advanced: true
            default_value: ''
            description: ''
            sample: true
            title: DH KEY
          host:
            advanced: true
            default_value: ''
            description: The target server to report results to.
            sample: true
            title: TARGET HOST
          host check:
            advanced: true
            default_value: 'false'
            description: Submit every result on this target as a Nagios host check (PROCESS_HOST_CHECK_RESULT)
              instead of a service check. Default false. The legacy alias 'host_check' is also still honoured
              for backwards compatibility.
            sample: true
            title: HOST CHECK
          identity:
            advanced: false
            default_value: ''
            description: The PSK identity sent to the server. Defaults to the sender hostname when empty.
            sample: true
            title: IDENTITY
          insecure:
            advanced: true
            default_value: 'false'
            description: When true, allow TLS connections that do not authenticate the server (no PSK
              and no peer-cert verification). Off by default; enabling this disables protection against
              man-in-the-middle attacks.
            sample: true
            title: INSECURE
          max output length:
            advanced: true
            default_value: '65536'
            description: Maximum number of bytes from the plugin output to forward to the server. Default
              65536 (64 KiB).
            sample: true
            title: MAX OUTPUT LENGTH
          password:
            advanced: false
            default_value: ''
            description: The password used for NSCA-NG PSK authentication. Must match the server configuration.
            sample: true
            title: PASSWORD
          port:
            advanced: true
            default_value: ''
            description: The target server port
            sample: true
            title: TARGET PORT
          retries:
            advanced: false
            default_value: '3'
            description: Number of times to retry sending.
            sample: true
            title: RETRIES
          timeout:
            advanced: false
            default_value: '30'
            description: Timeout (in seconds) when reading/writing packets to/from sockets.
            sample: true
            title: TIMEOUT
          use psk:
            advanced: true
            default_value: 'true'
            description: Use TLS-PSK for authentication. When false, use certificate-based TLS.
            sample: true
            title: USE PSK
          use ssl:
            advanced: false
            default_value: ''
            description: This option controls if SSL should be enabled.
            sample: true
            title: ENABLE SSL ENCRYPTION
          verify mode:
            advanced: false
            default_value: ''
            description: ''
            sample: true
            title: VERIFY MODE
  queries:
    submit_nsca_ng:
      info:
        description: Submit information to the remote NSCA-NG server. Custom relay commands defined under
          [/settings/NSCA-NG/client/handlers] are registered automatically using the same `submit_<alias>`
          naming convention.
      params:
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (this screen)
        name: help
        repeatable: false
        required: false
        short_description: Show help screen (this screen)
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen as a protocol buffer payload
        name: help-pb
        repeatable: false
        required: false
        short_description: Show help screen as a protocol buffer payload
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show default values for a given command
        name: show-default
        repeatable: false
        required: false
        short_description: Show default values for a given command
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (short format).
        name: help-short
        repeatable: false
        required: false
        short_description: Show help screen (short format).
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: The host of the host running the server
        name: host
        repeatable: false
        required: false
        short_description: The host of the host running the server
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: The port of the host running the server
        name: port
        repeatable: false
        required: false
        short_description: The port of the host running the server
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: The address (host:port) of the host running the server
        name: address
        repeatable: false
        required: false
        short_description: The address (host:port) of the host running the server
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Number of seconds before connection times out (default=10)
        name: timeout
        repeatable: false
        required: false
        short_description: Number of seconds before connection times out (default=10)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Target to use (lookup connection info from config)
        name: target
        repeatable: false
        required: false
        short_description: Target to use (lookup connection info from config)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Number of times ti retry a failed connection attempt (default=2)
        name: retry
        repeatable: false
        required: false
        short_description: Number of times ti retry a failed connection attempt (default=2)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: legacy version of retry
        name: retries
        repeatable: false
        required: false
        short_description: legacy version of retry
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Source/sender host name (default is auto which means use the name of the actual
          host)
        name: source-host
        repeatable: false
        required: false
        short_description: Source/sender host name (default is auto which means use the name of the actual
          host)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Source/sender host name (default is auto which means use the name of the actual
          host)
        name: sender-host
        repeatable: false
        required: false
        short_description: Source/sender host name (default is auto which means use the name of the actual
          host)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: The name of the command that the remote daemon should run
        name: command
        repeatable: false
        required: false
        short_description: The name of the command that the remote daemon should run
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Same as command
        name: alias
        repeatable: false
        required: false
        short_description: Same as command
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Message
        name: message
        repeatable: false
        required: false
        short_description: Message
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Result code either a number or OK, WARN, CRIT, UNKNOWN
        name: result
        repeatable: false
        required: false
        short_description: Result code either a number or OK, WARN, CRIT, UNKNOWN
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Separator to use for the batch command (default is |)
        name: separator
        repeatable: false
        required: false
        short_description: Separator to use for the batch command (default is |)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: 'Add multiple records using the separator format is: command|result|message'
        name: batch
        repeatable: false
        required: false
        short_description: 'Add multiple records using the separator format is: command|result|message'
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: The client certificate to use
        name: certificate
        repeatable: false
        required: false
        short_description: The client certificate to use
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: The DH key to use
        name: dh
        repeatable: false
        required: false
        short_description: The DH key to use
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Client certificate to use
        name: certificate-key
        repeatable: false
        required: false
        short_description: Client certificate to use
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Client certificate format
        name: certificate-format
        repeatable: false
        required: false
        short_description: Client certificate format
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Certificate authority
        name: ca
        repeatable: false
        required: false
        short_description: Certificate authority
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Client certificate format
        name: verify
        repeatable: false
        required: false
        short_description: Client certificate format
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Client certificate format
        name: allowed-ciphers
        repeatable: false
        required: false
        short_description: Client certificate format
      - content_type: 2
        default_value: '1'
        is_simple: false
        long_description: Initial an ssl handshake with the server.
        name: ssl
        repeatable: false
        required: false
        short_description: Initial an ssl handshake with the server.
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: The PSK password (must match the NSCA-NG server configuration)
        name: password
        repeatable: false
        required: false
        short_description: The PSK password (must match the NSCA-NG server configuration)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: PSK identity string (defaults to hostname when empty)
        name: identity
        repeatable: false
        required: false
        short_description: PSK identity string (defaults to hostname when empty)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Host name to report to the NSCA-NG server
        name: hostname
        repeatable: false
        required: false
        short_description: Host name to report to the NSCA-NG server
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Disable PSK and use certificate-based TLS authentication instead
        name: no-psk
        repeatable: false
        required: false
        short_description: Disable PSK and use certificate-based TLS authentication instead
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Allow TLS connections without PSK and without peer-cert verification. Disables
          MITM protection.
        name: insecure
        repeatable: false
        required: false
        short_description: Allow TLS connections without PSK and without peer-cert verification. Disables
          MITM protection.
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Submit every result as a Nagios host check (PROCESS_HOST_CHECK_RESULT) instead
          of a service check.
        name: host-check
        repeatable: false
        required: false
        short_description: Submit every result as a Nagios host check (PROCESS_HOST_CHECK_RESULT) instead
          of a service check.
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Maximum bytes of plugin output forwarded over the wire (default 65536)
        name: max-output-length
        repeatable: false
        required: false
        short_description: Maximum bytes of plugin output forwarded over the wire (default 65536)
module: NSCANgClient
namespace: client
platforms:
- unix
- windows
