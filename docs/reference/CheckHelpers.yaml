        advanced: false
        description: 'A list of aliases for already-defined commands (with arguments).

          An alias is an internal command that has been predefined to provide a single command without
          arguments. Be careful so you don''t create loops (e.g. check_loop=check_a, check_a=check_loop).

          Aliases are also available in CheckExternalScripts under [/settings/external scripts/alias];
          use this section when you want aliases without enabling external-script execution. If the same
          alias name is registered by both modules, the last one to load wins - avoid duplicating definitions.'
        subkey: true
        title: Command aliases
