module: CheckLogFile
namespace: check
platforms:
- unix
unix:
  aliases:
    checklogfile:
      description: 'Alternative name for: check_logfile'
  info:
    description: File for checking log files and various other forms of updating text files
    title: CheckLogFile
  paths:
    /settings/logfile/real-time:
      info:
        advanced: false
        description: A set of options to configure the real time checks
        subkey: false
        title: Real-time filtering
      keys:
        enabled:
          advanced: false
          default_value: 'false'
          description: Spawns a background thread which waits for file changes.
          sample: false
          title: Real time
    /settings/logfile/real-time/checks:
      info:
        advanced: false
        description: A set of filters to use in real-time mode
        subkey: true
        title: Real-time filters
      sample:
        keys:
          column split:
            advanced: false
            default_value: ''
            description: THe character(s) to use when splitting on column level
            sample: true
            title: COLUMN SPLIT
          column-split:
            advanced: true
            default_value: ''
            description: Alias for column split
            sample: true
            title: COLUMN SPLIT
          command:
            advanced: true
            default_value: ''
            description: The name of the command (think nagios service name) to report up stream (defaults
              to alias if not set)
            sample: true
            title: COMMAND NAME
          critical:
            advanced: false
            default_value: ''
            description: If any rows match this filter severity will escalated to CRITICAL
            sample: true
            title: CRITICAL FILTER
          debug:
            advanced: true
            default_value: ''
            description: Enable this to display debug information for this match filter
            sample: true
            title: DEBUG
          destination:
            advanced: true
            default_value: ''
            description: The destination for intercepted messages
            sample: true
            title: DESTINATION
          detail syntax:
            advanced: true
            default_value: ''
            description: Format string for dates
            sample: true
            title: SYNTAX
          empty message:
            advanced: true
            default_value: eventlog found no records
            description: The message to display if nothing matches the filter (generally considered the
              ok state).
            sample: true
            title: EMPTY MESSAGE
          escape html:
            advanced: true
            default_value: ''
            description: Escape HTML characters (< and >).
            sample: true
            title: ESCAPE HTML
          file:
            advanced: false
            default_value: ''
            description: The file check
            sample: true
            title: FILE
          files:
            advanced: true
            default_value: ''
            description: Check multiple files
            sample: true
            title: FILES
          filter:
            advanced: false
            default_value: ''
            description: Scan files for matching rows for each matching rows an OK message will be submitted
            sample: true
            title: FILTER
          maximum age:
            advanced: false
            default_value: 5m
            description: 'How long before reporting "ok".

              If this is set to "false" no periodic ok messages will be reported only errors.'
            sample: true
            title: MAXIMUM AGE
          ok:
            advanced: false
            default_value: ''
            description: If any rows match this filter severity will escalated down to OK
            sample: true
            title: OK FILTER
          ok syntax:
            advanced: true
            default_value: ''
            description: Format string for dates
            sample: true
            title: SYNTAX
          perf config:
            advanced: true
            default_value: ''
            description: Performance data configuration
            sample: true
            title: PERF CONFIG
          read entire file:
            advanced: true
            default_value: ''
            description: When set to `true` the file is read in full on every check. When `false` (the
              default) the real-time check resumes reading from the position it stopped at the previous
              time the file was processed, so only newly-appended data is matched. If the file shrinks
              (for example after log rotation) the next check restarts from the beginning.
            sample: true
            title: read entire file
          severity:
            advanced: true
            default_value: ''
            description: THe severity of this message (OK, WARNING, CRITICAL, UNKNOWN)
            sample: true
            title: SEVERITY
          silent period:
            advanced: false
            default_value: 'false'
            description: 'How long before a new alert is reported after an alert is reported. In other
              words whenever an alert is fired and a notification is sent the same notification will not
              be sent again until this period has ended.

              If this is set to "false" no periodic ok messages will be reported only errors.'
            sample: true
            title: Silent period
          source id:
            advanced: true
            default_value: ''
            description: The name of the source system, will automatically use the remote system if a
              remote system is called. Almost most sending systems will replace this with current systems
              hostname if not present. So use this only if you need specific source systems for specific
              schedules and not calling remote systems.
            sample: true
            title: SOURCE ID
          target:
            advanced: false
            default_value: ''
            description: Same as destination
            sample: true
            title: DESTINATION
          target id:
            advanced: true
            default_value: ''
            description: The target to send the message to (will be resolved by the consumer)
            sample: true
            title: TARGET ID
          top syntax:
            advanced: true
            default_value: ''
            description: Format string for dates
            sample: true
            title: SYNTAX
          warning:
            advanced: false
            default_value: ''
            description: If any rows match this filter severity will escalated to WARNING
            sample: true
            title: WARNING FILTER
  queries:
    check_logfile:
      fields:
      - generic: false
        long_description: 'Fetch the value from the given column number.

          Syntax: column(<coulmn number>)'
        name: column()
        short_description: ''
      - generic: false
        long_description: The value in the first column
        name: column1
        short_description: ''
      - generic: false
        long_description: The value in the second column
        name: column2
        short_description: ''
      - generic: false
        long_description: The value in the third column
        name: column3
        short_description: ''
      - generic: false
        long_description: The value in the 4:th column
        name: column4
        short_description: ''
      - generic: false
        long_description: The value in the 5:th column
        name: column5
        short_description: ''
      - generic: false
        long_description: The value in the 6:th column
        name: column6
        short_description: ''
      - generic: false
        long_description: The value in the 7:th column
        name: column7
        short_description: ''
      - generic: false
        long_description: The value in the 8:th column
        name: column8
        short_description: ''
      - generic: false
        long_description: The value in the 9:th column
        name: column9
        short_description: ''
      - generic: true
        long_description: Number of items matching the filter. Common option for all checks.
        name: count
        short_description: ''
      - generic: true
        long_description: Number of items matched the critical criteria. Common option for all checks.
        name: crit_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the critical criteria. Common option for all
          checks.
        name: crit_list
        short_description: ''
      - generic: true
        long_description: A special list with critical, then warning and finally ok. Common option for
          all checks.
        name: detail_list
        short_description: ''
      - generic: false
        long_description: The name of the file
        name: file
        short_description: ''
      - generic: false
        long_description: The name of the file
        name: filename
        short_description: ''
      - generic: false
        long_description: Match the content of an entire line
        name: line
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the filter. Common option for all checks.
        name: list
        short_description: ''
      - generic: true
        long_description: Number of items matched the ok criteria. Common option for all checks.
        name: ok_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the ok criteria. Common option for all checks.
        name: ok_list
        short_description: ''
      - generic: true
        long_description: Number of items matched either warning or critical criteria. Common option for
          all checks.
        name: problem_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched either the critical or the warning criteria.
          Common option for all checks.
        name: problem_list
        short_description: ''
      - generic: true
        long_description: The returned status (OK/WARN/CRIT/UNKNOWN). Common option for all checks.
        name: status
        short_description: ''
      - generic: true
        long_description: Total number of items. Common option for all checks.
        name: total
        short_description: ''
      - generic: true
        long_description: Number of items matched the warning criteria. Common option for all checks.
        name: warn_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the warning criteria. Common option for all
          checks.
        name: warn_list
        short_description: ''
      info:
        description: Check for errors in log file or generic pattern matching in text files.
      params:
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'Filter which marks interesting items.

          Interesting items are items which will be included in the check.

          They do not denote warning or critical state instead it defines which items are relevant and
          you can remove unwanted items.'
        name: filter
        repeatable: false
        required: false
        short_description: Filter which marks interesting items.
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'Filter which marks items which generates a warning state.

          If anything matches this filter the return status will be escalated to warning.

          '
        name: warning
        repeatable: false
        required: false
        short_description: Filter which marks items which generates a warning state.
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Short alias for warning
        name: warn
        repeatable: false
        required: false
        short_description: Short alias for warning
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'Filter which marks items which generates a critical state.

          If anything matches this filter the return status will be escalated to critical.

          '
        name: critical
        repeatable: false
        required: false
        short_description: Filter which marks items which generates a critical state.
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Short alias for critical.
        name: crit
        repeatable: false
        required: false
        short_description: Short alias for critical.
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'Filter which marks items which generates an ok state.

          If anything matches this any previous state for this item will be reset to ok.'
        name: ok
        repeatable: false
        required: false
        short_description: Filter which marks items which generates an ok state.
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show debugging information in the log
        name: debug
        repeatable: false
        required: false
        short_description: Show debugging information in the log
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show details for all matches regardless of status (normally details are only
          showed for warnings and criticals).
        name: show-all
        repeatable: false
        required: false
        short_description: Show details for all matches regardless of status (normally details are only
          showed for warnings and criticals).
      - content_type: 2
        default_value: ignored
        is_simple: false
        long_description: 'Return status to use when nothing matched filter.

          If no filter is specified this will never happen unless the file is empty.'
        name: empty-state
        repeatable: false
        required: false
        short_description: Return status to use when nothing matched filter.
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'Performance data generation configuration

          TODO: obj ( key: value; key: value) obj (key:valuer;key:value)'
        name: perf-config
        repeatable: false
        required: false
        short_description: Performance data generation configuration
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Escape any < and > characters to prevent HTML encoding
        name: escape-html
        repeatable: false
        required: false
        short_description: Escape any < and > characters to prevent HTML encoding
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (this screen)
        name: help
        repeatable: false
        required: false
        short_description: Show help screen (this screen)
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen as a protocol buffer payload
        name: help-pb
        repeatable: false
        required: false
        short_description: Show help screen as a protocol buffer payload
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show default values for a given command
        name: show-default
        repeatable: false
        required: false
        short_description: Show default values for a given command
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (short format).
        name: help-short
        repeatable: false
        required: false
        short_description: Show help screen (short format).
      - content_type: 2
        default_value: ${count}/${total} (${problem_list})
        is_simple: false
        long_description: 'Top level syntax.

          Used to format the message to return can include text as well as special keywords which will
          include information from the checks.

          To add a keyword to the message you can use two syntaxes either ${keyword} or %(keyword) (there
          is no difference between them apart from ${} can be difficult to escape on linux).'
        name: top-syntax
        repeatable: false
        required: false
        short_description: Top level syntax.
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'ok syntax.

          DEPRECATED! This is the syntax for when an ok result is returned.

          This value will not be used if your syntax contains %(list) or %(count).'
        name: ok-syntax
        repeatable: false
        required: false
        short_description: ok syntax.
      - content_type: 2
        default_value: '%(status): Nothing found'
        is_simple: false
        long_description: 'Empty syntax.

          DEPRECATED! This is the syntax for when nothing matches the filter.'
        name: empty-syntax
        repeatable: false
        required: false
        short_description: Empty syntax.
      - content_type: 2
        default_value: ${column1}
        is_simple: false
        long_description: 'Detail level syntax.

          Used to format each resulting item in the message.

          %(list) will be replaced with all the items formated by this syntax string in the top-syntax.

          To add a keyword to the message you can use two syntaxes either ${keyword} or %(keyword) (there
          is no difference between them apart from ${} can be difficult to escape on linux).'
        name: detail-syntax
        repeatable: false
        required: false
        short_description: Detail level syntax.
      - content_type: 2
        default_value: ${column1}
        is_simple: false
        long_description: 'Performance alias syntax.

          This is the syntax for the base names of the performance data.'
        name: perf-syntax
        repeatable: false
        required: false
        short_description: Performance alias syntax.
      - content_type: 2
        default_value: \n
        is_simple: false
        long_description: 'Character string used to split a file into several lines (default `\n`).

          The escape sequences `\n` and `\t` are translated to LF and TAB respectively; all other characters
          are taken literally. Multi-character delimiters are supported (for example `\r\n` to split strictly
          on CRLF, or `|||` for a  custom separator). Setting `line-split` to an empty value (`line-split=`)
          makes the entire file content available as a single record, which is useful together with a
          multi-line regular-expression filter.\nWhen the chosen delimiter ends with `

          `, a trailing carriage return is stripped from each record so that files with CRLF line endings
          produce clean lines.'
        name: line-split
        repeatable: false
        required: false
        short_description: Character string used to split a file into several lines (default `\n`).
      - content_type: 2
        default_value: \t
        is_simple: false
        long_description: Character string to split a line into several columns (default \t)
        name: column-split
        repeatable: false
        required: false
        short_description: Character string to split a line into several columns (default \t)
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Alias for split-column
        name: split
        repeatable: false
        required: false
        short_description: Alias for split-column
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'File to read (can be specified multiple times to check multiple files.

          Notice that specifying multiple files will create an aggregate set it will not check each file
          individually.

          In other words if one file contains an error the entire check will result in error or if you
          check the count it is the global count which is used.'
        name: file
        repeatable: false
        required: false
        short_description: File to read (can be specified multiple times to check multiple files.
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: A comma separated list of files to scan (same as file except a list)
        name: files
        repeatable: false
        required: false
        short_description: A comma separated list of files to scan (same as file except a list)
