      - generic: true
        long_description: A special list with critical, then warning and finally ok. Common option for
          all checks.
        name: detail_list
        short_description: ''
      - generic: false
        long_description: True if the certificate has already expired
        name: expired
        short_description: ''
      - generic: false
        long_description: Whole days until the certificate expires (negative if already expired)
        name: expires_in
        short_description: ''
      - generic: false
        long_description: Alias for expires_in
        name: expires_in_days
        short_description: ''
      - generic: false
        long_description: Seconds until the certificate expires (negative if already expired)
        name: expires_in_sec
        short_description: ''
      - generic: false
        long_description: Certificate issuer distinguished name
        name: issuer
        short_description: ''
      - generic: false
        long_description: Public key size in bits
        name: key_size
        short_description: ''
      - generic: false
        long_description: Public key type (RSA, EC, DSA, ...)
        name: key_type
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the filter. Common option for all checks.
        name: list
        short_description: ''
      - generic: false
        long_description: The not-after / expiry date
        name: not_after
        short_description: ''
      - generic: false
        long_description: The not-before date
        name: not_before
        short_description: ''
      - generic: false
        long_description: True if the certificate is not yet valid (not-before is in the future)
        name: not_yet_valid
        short_description: ''
      - generic: true
        long_description: Number of items matched the ok criteria. Common option for all checks.
        name: ok_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the ok criteria. Common option for all checks.
        name: ok_list
        short_description: ''
      - generic: true
        long_description: Number of items matched either warning or critical criteria. Common option for
          all checks.
        name: problem_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched either the critical or the warning criteria.
          Common option for all checks.
        name: problem_list
        short_description: ''
      - generic: false
        long_description: True if the certificate is self-signed
        name: self_signed
        short_description: ''
      - generic: false
        long_description: Certificate serial number (hex)
        name: serial
        short_description: ''
      - generic: false
        long_description: Signature algorithm (e.g. sha256WithRSAEncryption)
        name: signature_algorithm
        short_description: ''
      - generic: false
        long_description: Where the certificate was read from (file path or store)
        name: source
        short_description: ''
      - generic: true
        long_description: The returned status (OK/WARN/CRIT/UNKNOWN). Common option for all checks.
        name: status
        short_description: ''
      - generic: false
        long_description: The store/source type (file or a Windows store name)
        name: store
        short_description: ''
      - generic: false
        long_description: Certificate subject (e.g. /CN=host.example.com)
        name: subject
        short_description: ''
      - generic: false
        long_description: SHA-1 fingerprint (lower-case hex)
        name: thumbprint
        short_description: ''
      - generic: true
        long_description: Total number of items. Common option for all checks.
        name: total
        short_description: ''
      - generic: false
        long_description: True if the certificate chains to a trusted CA (system store or ca=; time validity
          is ignored — use expired/not_yet_valid for that)
        name: trusted
        short_description: ''
      - generic: false
        long_description: Not-before date (UTC)
        name: valid_from
        short_description: ''
      - generic: false
        long_description: Not-after / expiry date (UTC)
        name: valid_to
        short_description: ''
      - generic: true
        long_description: Number of items matched the warning criteria. Common option for all checks.
        name: warn_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the warning criteria. Common option for all
