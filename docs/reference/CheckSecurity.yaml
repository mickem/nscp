        name: warn_list
        short_description: ''
      - generic: false
        long_description: True if the key is weak (RSA/DSA < 2048 bits, or EC < 256 bits)
        name: weak_key
        short_description: ''
      - generic: false
        long_description: True if signed with a weak algorithm (MD5 or SHA-1)
        name: weak_signature
        short_description: ''
      info:
        description: Check X.509 certificate expiry/validity/hygiene from files (all platforms) or the
          Windows certificate store.
      params:
