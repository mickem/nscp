      - content_type: 2
        default_value: No DNS lookup performed
        is_simple: false
        long_description: 'Empty syntax.

          DEPRECATED! This is the syntax for when nothing matches the filter.'
        name: empty-syntax
        repeatable: false
        required: false
        short_description: Empty syntax.
      - content_type: 2
        default_value: ${host} -> ${addresses} (${count}) in ${time}ms [${result}]
