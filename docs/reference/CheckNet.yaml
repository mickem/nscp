        name: problem_list
        short_description: ''
      - generic: false
        long_description: Textual result of the lookup (ok, not_found, mismatch, error, ...)
        name: result
        short_description: ''
      - generic: false
        long_description: DNS server used (empty for the system resolver)
        name: server
        short_description: ''
      - generic: true
        long_description: The returned status (OK/WARN/CRIT/UNKNOWN). Common option for all checks.
        name: status
        short_description: ''
      - generic: false
        long_description: Time taken by the lookup in milliseconds
