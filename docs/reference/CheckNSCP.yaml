        name: problem_list
        short_description: ''
      - generic: false
        long_description: The release (the 0 in 0.1.2.3)
        name: release
        short_description: ''
      - generic: true
        long_description: The returned status (OK/WARN/CRIT/UNKNOWN). Common option for all checks.
