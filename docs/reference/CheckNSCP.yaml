module: CheckNSCP
namespace: check
platforms:
- unix
unix:
  info:
    description: Use this module to check the health and status of NSClient++ it self
    title: CheckNSCP
  paths:
    /settings/nscp/check/update:
      info:
        advanced: false
        description: Configuration for the check_nscp_update command which checks GitHub for newer NSClient++
          releases.
        subkey: false
        title: Update check
      keys:
        ca:
          advanced: false
          default_value: ${ca-path}
          description: Path to a CA bundle used to verify the update endpoint certificate. Defaults to
            the trusted system CA store; point at a private bundle when running behind a TLS-inspecting
            proxy.
          sample: false
          title: CA bundle
        cache hours:
          advanced: false
          default_value: '24'
          description: Number of hours to cache the latest version lookup. The GitHub API is queried at
            most once per cache window to avoid rate limits.
          sample: false
          title: Cache duration
        check experimental:
          advanced: false
          default_value: 'false'
          description: When true, GitHub pre-releases (experimental builds) are also considered when determining
            the latest available version. When false (default) only stable releases are considered.
          sample: false
          title: Include pre-releases
        tls version:
          advanced: false
          default_value: tlsv1.2+
          description: 'Minimum TLS protocol version accepted when fetching the GitHub releases endpoint.
            Defaults to tlsv1.2+ which permits TLS 1.2 and TLS 1.3 only. Allowed values: tlsv1.0, tlsv1.1,
            tlsv1.2, tlsv1.2+, tlsv1.3.'
          sample: false
          title: Minimum TLS version
        url:
          advanced: false
          default_value: https://api.github.com/repos/mickem/nscp/releases
          description: Base URL of the GitHub releases API used to look up the latest NSClient++ version.
            Point this at a mirror or internal proxy when running in environments without direct GitHub
            access.
          sample: false
          title: Update URL
        verify mode:
          advanced: false
          default_value: peer
          description: TLS certificate verification mode applied to the update endpoint. Defaults to 'peer'
            so the server certificate chain is validated against the configured CA bundle. Set to 'none'
            to disable verification (not recommended).
          sample: false
          title: Certificate verify mode
  queries:
    check_nscp:
      info:
        description: Check the internal health of NSClient++.
      params:
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (this screen)
        name: help
        repeatable: false
        required: false
        short_description: Show help screen (this screen)
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen as a protocol buffer payload
        name: help-pb
        repeatable: false
        required: false
        short_description: Show help screen as a protocol buffer payload
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show default values for a given command
        name: show-default
        repeatable: false
        required: false
        short_description: Show default values for a given command
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (short format).
        name: help-short
        repeatable: false
        required: false
        short_description: Show help screen (short format).
    check_nscp_update:
      fields:
      - generic: false
        long_description: The build component of the installed version (the 3 in 0.1.2.3)
        name: build
        short_description: ''
      - generic: true
        long_description: Number of items matching the filter. Common option for all checks.
        name: count
        short_description: ''
      - generic: true
        long_description: Number of items matched the critical criteria. Common option for all checks.
        name: crit_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the critical criteria. Common option for all
          checks.
        name: crit_list
        short_description: ''
      - generic: false
        long_description: The build date of the currently installed NSClient++
        name: date
        short_description: ''
      - generic: true
        long_description: A special list with critical, then warning and finally ok. Common option for
          all checks.
        name: detail_list
        short_description: ''
      - generic: false
        long_description: Error message if the latest version could not be determined (empty when ok)
        name: error
        short_description: ''
      - generic: false
        long_description: The build component of the latest available version
        name: latest_build
        short_description: ''
      - generic: false
        long_description: The major component of the latest available version
        name: latest_major
        short_description: ''
      - generic: false
        long_description: The minor component of the latest available version
        name: latest_minor
        short_description: ''
      - generic: false
        long_description: The release component of the latest available version
        name: latest_release
        short_description: ''
      - generic: false
        long_description: The latest available NSClient++ version (empty if lookup failed)
        name: latest_version
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the filter. Common option for all checks.
        name: list
        short_description: ''
      - generic: false
        long_description: The major component of the installed version (the 1 in 0.1.2.3)
        name: major
        short_description: ''
      - generic: false
        long_description: The minor component of the installed version (the 2 in 0.1.2.3)
        name: minor
        short_description: ''
      - generic: true
        long_description: Number of items matched the ok criteria. Common option for all checks.
        name: ok_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the ok criteria. Common option for all checks.
        name: ok_list
        short_description: ''
      - generic: true
        long_description: Number of items matched either warning or critical criteria. Common option for
          all checks.
        name: problem_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched either the critical or the warning criteria.
          Common option for all checks.
        name: problem_list
        short_description: ''
      - generic: false
        long_description: Publication date of the latest release
        name: published
        short_description: ''
      - generic: false
        long_description: The release component of the installed version (the 0 in 0.1.2.3)
        name: release
        short_description: ''
      - generic: true
        long_description: The returned status (OK/WARN/CRIT/UNKNOWN). Common option for all checks.
        name: status
        short_description: ''
      - generic: false
        long_description: The GitHub tag of the latest release
        name: tag
        short_description: ''
      - generic: true
        long_description: Total number of items. Common option for all checks.
        name: total
        short_description: ''
      - generic: false
        long_description: 1 when the latest available version is newer than the running version, 0 otherwise
          (and 0 if the lookup failed)
        name: update_available
        short_description: ''
      - generic: false
        long_description: URL of the latest release on GitHub
        name: url
        short_description: ''
      - generic: false
        long_description: The currently installed NSClient++ version
        name: version
        short_description: ''
      - generic: false
        long_description: Difference between latest and current version components (largest meaningful
          component) when an update is available, 0 otherwise
        name: versions_behind
        short_description: ''
      - generic: true
        long_description: Number of items matched the warning criteria. Common option for all checks.
        name: warn_count
        short_description: ''
      - generic: true
        long_description: A list of all items which matched the warning criteria. Common option for all
          checks.
        name: warn_list
        short_description: ''
      info:
        description: Check if there is a newer version of NSClient++ available on GitHub. The result is
          cached (default 24 hours) to avoid hitting the GitHub API rate limit.
      params:
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'Filter which marks interesting items.

          Interesting items are items which will be included in the check.

          They do not denote warning or critical state instead it defines which items are relevant and
          you can remove unwanted items.'
        name: filter
        repeatable: false
        required: false
        short_description: Filter which marks interesting items.
      - content_type: 2
        default_value: update_available = 1
        is_simple: false
        long_description: 'Filter which marks items which generates a warning state.

          If anything matches this filter the return status will be escalated to warning.

          '
        name: warning
        repeatable: false
        required: false
        short_description: Filter which marks items which generates a warning state.
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Short alias for warning
        name: warn
        repeatable: false
        required: false
        short_description: Short alias for warning
      - content_type: 2
        default_value: update_available = 1
        is_simple: false
        long_description: 'Filter which marks items which generates a critical state.

          If anything matches this filter the return status will be escalated to critical.

          '
        name: critical
        repeatable: false
        required: false
        short_description: Filter which marks items which generates a critical state.
      - content_type: 2
        default_value: ''
        is_simple: true
        long_description: Short alias for critical.
        name: crit
        repeatable: false
        required: false
        short_description: Short alias for critical.
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'Filter which marks items which generates an ok state.

          If anything matches this any previous state for this item will be reset to ok.'
        name: ok
        repeatable: false
        required: false
        short_description: Filter which marks items which generates an ok state.
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show debugging information in the log
        name: debug
        repeatable: false
        required: false
        short_description: Show debugging information in the log
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show details for all matches regardless of status (normally details are only
          showed for warnings and criticals).
        name: show-all
        repeatable: false
        required: false
        short_description: Show details for all matches regardless of status (normally details are only
          showed for warnings and criticals).
      - content_type: 2
        default_value: ignored
        is_simple: false
        long_description: 'Return status to use when nothing matched filter.

          If no filter is specified this will never happen unless the file is empty.'
        name: empty-state
        repeatable: false
        required: false
        short_description: Return status to use when nothing matched filter.
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'Performance data generation configuration

          TODO: obj ( key: value; key: value) obj (key:valuer;key:value)'
        name: perf-config
        repeatable: false
        required: false
        short_description: Performance data generation configuration
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Escape any < and > characters to prevent HTML encoding
        name: escape-html
        repeatable: false
        required: false
        short_description: Escape any < and > characters to prevent HTML encoding
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (this screen)
        name: help
        repeatable: false
        required: false
        short_description: Show help screen (this screen)
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen as a protocol buffer payload
        name: help-pb
        repeatable: false
        required: false
        short_description: Show help screen as a protocol buffer payload
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show default values for a given command
        name: show-default
        repeatable: false
        required: false
        short_description: Show default values for a given command
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (short format).
        name: help-short
        repeatable: false
        required: false
        short_description: Show help screen (short format).
      - content_type: 2
        default_value: '${status}: ${list}'
        is_simple: false
        long_description: 'Top level syntax.

          Used to format the message to return can include text as well as special keywords which will
          include information from the checks.

          To add a keyword to the message you can use two syntaxes either ${keyword} or %(keyword) (there
          is no difference between them apart from ${} can be difficult to escape on linux).'
        name: top-syntax
        repeatable: false
        required: false
        short_description: Top level syntax.
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'ok syntax.

          DEPRECATED! This is the syntax for when an ok result is returned.

          This value will not be used if your syntax contains %(list) or %(count).'
        name: ok-syntax
        repeatable: false
        required: false
        short_description: ok syntax.
      - content_type: 2
        default_value: ''
        is_simple: false
        long_description: 'Empty syntax.

          DEPRECATED! This is the syntax for when nothing matches the filter.'
        name: empty-syntax
        repeatable: false
        required: false
        short_description: Empty syntax.
      - content_type: 2
        default_value: '${version} (latest: ${latest_version})'
        is_simple: false
        long_description: 'Detail level syntax.

          Used to format each resulting item in the message.

          %(list) will be replaced with all the items formated by this syntax string in the top-syntax.

          To add a keyword to the message you can use two syntaxes either ${keyword} or %(keyword) (there
          is no difference between them apart from ${} can be difficult to escape on linux).'
        name: detail-syntax
        repeatable: false
        required: false
        short_description: Detail level syntax.
      - content_type: 2
        default_value: version
        is_simple: false
        long_description: 'Performance alias syntax.

          This is the syntax for the base names of the performance data.'
        name: perf-syntax
        repeatable: false
        required: false
        short_description: Performance alias syntax.
