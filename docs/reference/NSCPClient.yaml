common:
  info:
    description: NSCP client can be used both from command line and from queries to check remote systems
      via NSCP (REST)
    title: NSCPClient
  paths:
    /settings/NSCP/client:
      info:
        advanced: false
        description: Section for NSCP active/passive check module.
        subkey: false
        title: NSCP CLIENT SECTION
      keys:
        channel:
          advanced: false
          default_value: NSCP
          description: The channel to listen to.
          sample: false
          title: CHANNEL
    /settings/NSCP/client/handlers:
      info:
        advanced: false
        description: ''
        subkey: true
        title: CLIENT HANDLER SECTION
    /settings/NSCP/client/targets:
      info:
        advanced: false
        description: ''
        subkey: true
        title: REMOTE TARGET DEFINITIONS
      sample:
        keys:
          address:
            advanced: false
            default_value: ''
            description: Target host address
            sample: true
            title: TARGET ADDRESS
          allowed ciphers:
            advanced: false
            default_value: ''
            description: 'A better value is: ALL:!ADH:!LOW:!EXP:!MD5:@STRENGTH'
            sample: true
            title: ALLOWED CIPHERS
          ca:
            advanced: true
            default_value: ''
            description: ''
            sample: true
            title: CA
          certificate:
            advanced: false
            default_value: ''
            description: ''
            sample: true
            title: SSL CERTIFICATE
          certificate format:
            advanced: true
            default_value: ''
            description: ''
            sample: true
            title: CERTIFICATE FORMAT
          certificate key:
            advanced: true
            default_value: ''
            description: ''
            sample: true
            title: SSL CERTIFICATE
          dh:
            advanced: true
            default_value: ''
            description: ''
            sample: true
            title: DH KEY
          host:
            advanced: true
            default_value: ''
            description: The target server to report results to.
            sample: true
            title: TARGET HOST
          password:
            advanced: false
            default_value: ''
            description: The password to use to authenticate towards the server.
            sample: true
            title: PASSWORD
          port:
            advanced: true
            default_value: ''
            description: The target server port
            sample: true
            title: TARGET PORT
          retries:
            advanced: false
            default_value: '3'
            description: Number of times to retry sending.
            sample: true
            title: RETRIES
          timeout:
            advanced: false
            default_value: '30'
            description: Timeout (in seconds) when reading/writing packets to/from sockets.
            sample: true
            title: TIMEOUT
          use ssl:
            advanced: false
            default_value: ''
            description: This option controls if SSL should be enabled.
            sample: true
            title: ENABLE SSL ENCRYPTION
          verify mode:
            advanced: false
            default_value: ''
            description: ''
            sample: true
            title: VERIFY MODE
  queries:
    check_remote_nscp:
      info:
        description: Request remote information via NSCP.
      params:
      - content_type: 4
        default_value: ''
        is_simple: true
        long_description: Show help screen (this screen)
        name: help
        repeatable: false
        required: false
        short_description: Show help screen (this screen)
      - content_type: 4
        default_value: ''
