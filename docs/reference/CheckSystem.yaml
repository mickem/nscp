windows:
  aliases:
    check_counter:
      description: 'Alternative name for: check_pdh'
  info:
    description: Various system related checks, such as CPU load, process state, service state memory
      usage and PDH counters.
    title: CheckSystem
  paths:
    /settings/system/windows:
      info:
        advanced: false
        description: Section for system checks and system settings
        subkey: false
        title: Windows system
      keys:
        default buffer length:
          advanced: false
          default_value: 1h
          description: Used to define the default size of range buffer checks (ie. CPU).
          sample: false
          title: Default buffer time
        disable:
          advanced: true
          default_value: ''
          description: 'A comma separated list of checks to disable in the collector: battery,cpu,handles,network,temperature,cpu_frequency,os_updates,metrics,pdh.
            Please note disabling these will mean part of NSClient++ will no longer function as expected.'
          sample: false
          title: Disable automatic checks
        fetch core loads:
          advanced: true
          default_value: 'true'
          description: Set to false to use a different API for fetching CPU load (will not provide core
            load, and will not show exact same values as task manager).
          sample: false
          title: Fetch core load
        process history:
          advanced: false
          default_value: 'false'
          description: Enable tracking of process history for use with check_process_history and check_process_history_new
            commands.
          sample: false
          title: Track process history
        subsystem:
          advanced: true
          default_value: default
          description: 'Set which pdh subsystem to use.

            Currently default and thread-safe are supported where thread-safe is slower but required if
            you have some problematic counters.'
          sample: false
          title: PDH subsystem
        timezone:
          advanced: true
          default_value: local
          description: Timezone used to render dates such as boot time. Accepts 'local' (default), 'utc',
            or any POSIX TZ string parseable by Boost.Date_time (e.g. 'MST-07' or 'EST-05EDT,M3.2.0,M11.1.0').
          sample: false
          title: Timezone
        use pdh for cpu:
          advanced: true
          default_value: 'false'
          description: When using PDH you might get better accuracy and hel alleviate invalid CPU values
            on multi core systems. The drawback is that PDH counters are sometimes missing and have invalid
            indexes so your milage may vary
          sample: false
          title: Use PDH to fetch CPU load
    /settings/system/windows/counters:
      info:
        advanced: false
        description: Add counters to check
        subkey: true
        title: PDH Counters
      objects:
      - disk_queue_length
      sample:
        keys:
          alias:
            advanced: true
            default_value: ''
            description: The alias (service name) to report to server
            sample: false
            title: ALIAS
          buffer size:
            advanced: false
            default_value: ''
            description: Size of buffer (in seconds) larger buffer use more memory
            sample: true
            title: BUFFER SIZE
          collection strategy:
            advanced: false
            default_value: ''
            description: 'The way to handled values when collecting them: static means we keep the last
              known value, rrd means we store values in a buffer from which you can retrieve the average'
            sample: true
            title: COLLECTION STRATEGY
          counter:
            advanced: false
            default_value: ''
            description: The counter to check
            sample: true
            title: COUNTER
          flags:
            advanced: false
            default_value: ''
            description: Extra flags to configure the counter (nocap100, 1000, noscale)
            sample: true
            title: FLAGS
          instances:
            advanced: false
            default_value: ''
            description: 'IF we shoul interpret instance (default auto). Values: auto, true, false'
            sample: true
            title: Interpret instances
          is template:
            advanced: true
            default_value: 'false'
            description: Declare this object as a template (this means it will not be available as a separate
              object)
            sample: false
            title: IS TEMPLATE
          parent:
            advanced: true
            default_value: default
            description: The parent the target inherits from
            sample: false
            title: PARENT
          type:
            advanced: false
            default_value: ''
            description: The type of counter to use long, large and double
            sample: true
            title: COUNTER TYPE
    /settings/system/windows/real-time/checks:
      info:
        advanced: false
        description: A set of filters to use in real-time mode
        subkey: true
        title: Legacy generic filters
      sample:
        keys:
          check:
            advanced: false
            default_value: cpu
            description: The type of check cpu, memory or process
            sample: true
            title: TYPE OF CHECK
          command:
            advanced: true
            default_value: ''
            description: The name of the command (think nagios service name) to report up stream (defaults
              to alias if not set)
            sample: true
            title: COMMAND NAME
          critical:
            advanced: false
            default_value: ''
            description: If any rows match this filter severity will escalated to CRITICAL
            sample: true
            title: CRITICAL FILTER
          debug:
            advanced: true
            default_value: ''
            description: Enable this to display debug information for this match filter
            sample: true
            title: DEBUG
          destination:
            advanced: true
            default_value: ''
            description: The destination for intercepted messages
            sample: true
            title: DESTINATION
          detail syntax:
            advanced: true
            default_value: ''
            description: Format string for dates
            sample: true
            title: SYNTAX
          empty message:
            advanced: true
            default_value: eventlog found no records
            description: The message to display if nothing matches the filter (generally considered the
              ok state).
            sample: true
            title: EMPTY MESSAGE
          escape html:
            advanced: true
            default_value: ''
            description: Escape HTML characters (< and >).
            sample: true
            title: ESCAPE HTML
          filter:
            advanced: false
            default_value: ''
            description: Scan files for matching rows for each matching rows an OK message will be submitted
            sample: true
            title: FILTER
          maximum age:
            advanced: false
            default_value: 5m
            description: 'How long before reporting "ok".

              If this is set to "false" no periodic ok messages will be reported only errors.'
            sample: true
            title: MAXIMUM AGE
          ok:
            advanced: false
            default_value: ''
            description: If any rows match this filter severity will escalated down to OK
            sample: true
            title: OK FILTER
          ok syntax:
            advanced: true
            default_value: ''
            description: Format string for dates
            sample: true
            title: SYNTAX
          perf config:
            advanced: true
            default_value: ''
