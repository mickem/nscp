            sample: true
            title: SOURCE ID
          target:
            advanced: false
            default_value: ''
            description: Same as destination
            sample: true
            title: DESTINATION
          target id:
            advanced: true
            default_value: ''
            description: The target to send the message to (will be resolved by the consumer)
            sample: true
            title: TARGET ID
          top syntax:
            advanced: true
            default_value: ''
            description: Format string for dates
            sample: true
            title: SYNTAX
          type:
            advanced: false
