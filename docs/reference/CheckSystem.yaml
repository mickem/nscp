module: CheckSystem
namespace: windows
platforms:
- unix
unix:
  info:
    description: Various system related checks, such as CPU load, process state and memory.
    title: CheckSystem
  paths:
    /settings/default:
      info:
        advanced: false
        description: Default values used in other config sections.
        subkey: false
        title: Default values
      keys:
        allowed hosts:
          advanced: false
          default_value: 127.0.0.1
          description: A comma separated list of allowed hosts. You can use netmasks (/ syntax) or * to
            create ranges.
          sample: false
          title: Allowed hosts
        bind to:
          advanced: false
          default_value: ''
          description: Allows you to bind server to a specific local address. This has to be a dotted
            ip address not a host name. Leaving this blank will bind to all available IP addresses.
          sample: false
          title: BIND TO ADDRESS
        cache allowed hosts:
          advanced: false
          default_value: 'true'
          description: If host names (DNS entries) should be cached, improves speed and security somewhat
            but won't allow you to have dynamic IPs for your Nagios server.
          sample: false
          title: Cache list of allowed hosts
        encoding:
          advanced: true
          default_value: ''
          description: ''
          sample: false
          title: NRPE PAYLOAD ENCODING
        inbox:
          advanced: false
          default_value: inbox
          description: The default channel to post incoming messages on
          sample: false
          title: INBOX
        password:
          advanced: false
          default_value: ''
          description: Password used to authenticate against server
          sample: false
          title: Password
        socket queue size:
          advanced: true
          default_value: '0'
          description: Number of sockets to queue before starting to refuse new incoming connections.
            This can be used to tweak the amount of simultaneous sockets that the server accepts.
          sample: false
          title: LISTEN QUEUE
        thread pool:
          advanced: true
          default_value: '10'
          description: ''
          sample: false
          title: THREAD POOL
        timeout:
          advanced: false
          default_value: '30'
          description: Timeout (in seconds) when reading packets on incoming sockets. If the data has
            not arrived within this time we will bail out.
          sample: false
          title: TIMEOUT
        timezone:
          advanced: true
          default_value: local
          description: Timezone used to render dates such as boot time. Accepts 'local' (default), 'utc',
            or any POSIX TZ string parseable by Boost.Date_time (e.g. 'MST-07' or 'EST-05EDT,M3.2.0,M11.1.0').
          sample: false
          title: Timezone
    /settings/system/unix:
      info:
        advanced: false
        description: Section for system checks and system settings
        subkey: false
        title: Unix system
      keys:
        default buffer length:
          advanced: false
          default_value: 1h
          description: Used to define the default size of range buffer checks (ie. CPU).
          sample: false
          title: Default buffer time
        process history:
          advanced: false
          default_value: 'false'
          description: Enable tracking of process history for use with the check_process_history and check_process_history_new
            commands.
          sample: false
          title: Track process history
        timezone:
          advanced: true
          default_value: local
          description: Timezone used to render dates such as boot time. Accepts 'local' (default), 'utc',
            or any POSIX TZ string parseable by Boost.Date_time (e.g. 'MST-07' or 'EST-05EDT,M3.2.0,M11.1.0').
          sample: false
          title: Timezone
    /settings/system/unix/real-time/cpu:
      info:
        advanced: false
        description: A set of filters to use in real-time mode
        subkey: true
        title: Realtime cpu filters
      sample:
        keys:
          command:
            advanced: true
            default_value: ''
            description: The name of the command (think nagios service name) to report up stream (defaults
              to alias if not set)
            sample: true
            title: COMMAND NAME
          critical:
            advanced: false
            default_value: ''
            description: If any rows match this filter severity will escalated to CRITICAL
            sample: true
            title: CRITICAL FILTER
          debug:
            advanced: true
            default_value: ''
            description: Enable this to display debug information for this match filter
            sample: true
            title: DEBUG
          destination:
            advanced: true
            default_value: ''
            description: The destination for intercepted messages
            sample: true
            title: DESTINATION
          detail syntax:
            advanced: true
            default_value: ''
            description: Format string for dates
            sample: true
            title: SYNTAX
          empty message:
            advanced: true
            default_value: eventlog found no records
            description: The message to display if nothing matches the filter (generally considered the
              ok state).
            sample: true
            title: EMPTY MESSAGE
          escape html:
            advanced: true
            default_value: ''
            description: Escape HTML characters (< and >).
            sample: true
            title: ESCAPE HTML
          filter:
            advanced: false
            default_value: ''
            description: Scan files for matching rows for each matching rows an OK message will be submitted
            sample: true
            title: FILTER
          maximum age:
            advanced: false
            default_value: 5m
            description: 'How long before reporting "ok".

              If this is set to "false" no periodic ok messages will be reported only errors.'
            sample: true
            title: MAXIMUM AGE
          ok:
            advanced: false
            default_value: ''
            description: If any rows match this filter severity will escalated down to OK
            sample: true
            title: OK FILTER
          ok syntax:
            advanced: true
            default_value: ''
            description: Format string for dates
            sample: true
            title: SYNTAX
          perf config:
            advanced: true
            default_value: ''
            description: Performance data configuration
            sample: true
            title: PERF CONFIG
          severity:
            advanced: true
            default_value: ''
            description: THe severity of this message (OK, WARNING, CRITICAL, UNKNOWN)
            sample: true
            title: SEVERITY
          silent period:
            advanced: false
            default_value: 'false'
            description: 'How long before a new alert is reported after an alert is reported. In other
              words whenever an alert is fired and a notification is sent the same notification will not
              be sent again until this period has ended.

              If this is set to "false" no periodic ok messages will be reported only errors.'
            sample: true
            title: Silent period
          source id:
            advanced: true
            default_value: ''
            description: The name of the source system, will automatically use the remote system if a
              remote system is called. Almost most sending systems will replace this with current systems
              hostname if not present. So use this only if you need specific source systems for specific
              schedules and not calling remote systems.
            sample: true
            title: SOURCE ID
          target:
            advanced: false
            default_value: ''
            description: Same as destination
            sample: true
            title: DESTINATION
          target id:
            advanced: true
            default_value: ''
            description: The target to send the message to (will be resolved by the consumer)
            sample: true
            title: TARGET ID
          time:
            advanced: false
            default_value: ''
            description: The time to check
            sample: true
            title: TIME
          times:
            advanced: true
            default_value: ''
            description: A list of times to check (comma separated)
            sample: true
            title: TIMES
          top syntax:
            advanced: true
            default_value: ''
            description: Format string for dates
            sample: true
            title: SYNTAX
          warning:
            advanced: false
            default_value: ''
            description: If any rows match this filter severity will escalated to WARNING
            sample: true
            title: WARNING FILTER
    /settings/system/unix/real-time/memory:
      info:
        advanced: false
        description: A set of filters to use in real-time mode
        subkey: true
        title: Realtime memory filters
      sample:
