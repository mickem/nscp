name: Build web bundle

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      version:
        type: string
        description: 'Version to build'
        required: true

jobs:
  build-web:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: Build web frontend
      working-directory: web
      run: |
        npm install
        npm run build

    - name: Package bundle
      run: |
        set -euo pipefail
        zipname="NSCP-Web-${{ inputs.version }}.zip"
        shaname="NSCP-Web-${{ inputs.version }}.sha256"
        # Archive entries are rooted at the zip root (index.html, assets/, …),
        # not nested under dist/, so `unzip` extracts straight into ${web-path}.
        (cd web/dist && zip -r "${GITHUB_WORKSPACE}/${zipname}" .)
        # sha256sum-compatible single-line manifest, verifiable with
        # `sha256sum -c NSCP-Web-<version>.sha256`.
        sha256sum "${zipname}" > "${shaname}"

    - uses: actions/upload-artifact@v6
      with:
        name: NSCP-${{ inputs.version }}-web
        path: |
          NSCP-Web-${{ inputs.version }}.zip
          NSCP-Web-${{ inputs.version }}.sha256
        if-no-files-found: error
