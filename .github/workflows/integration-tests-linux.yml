name: Integration Tests (Linux)

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      container:
        type: string
        description: 'Docker container to use for testing (e.g., rockylinux/rockylinux:9)'
        required: true
      architecture:
        type: string
        description: 'Architecture to test'
        required: true
        default: 'x64'
      version:
        type: string
        description: 'Version to test'
        required: true
      artifact-name:
        type: string
        description: 'Name of the artifact to download'
        required: true
      package-type:
        type: string
        description: 'Package type (deb, rpm, zip)'
        required: true
      package-arch:
        type: string
        description: 'Package architecture suffix (e.g. amd64, arm64, x86_64, aarch64)'
        required: false
        default: 'amd64'
      runner:
        type: string
        description: 'GitHub-hosted runner to execute on (e.g. ubuntu-latest, ubuntu-24.04-arm)'
        required: false
        default: 'ubuntu-latest'
      distro:
        type: string
        description: 'Distribution name (ubuntu, rocky)'
        required: true
      distro_version:
        type: string
        description: 'Distribution version (e.g., 20.04, 9)'
        required: true

env:
  PYTHON_VERSION: 3.11

concurrency:
  group: integration-linux-${{ github.ref }}-${{ inputs.artifact-name }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    container:
      image: ${{ inputs.container }}

    steps:
      - name: Install base dependencies (DEB)
        if: inputs.package-type == 'deb'
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y git python3 python3-pip python3-venv nodejs npm

      - name: Install base dependencies (RPM)
        if: inputs.package-type == 'rpm'
        shell: sh
        run: |
          dnf install -y epel-release
          dnf install -y dnf-plugins-core
          if [ "${{ inputs.distro_version }}" = "8" ]; then
            dnf config-manager --set-enabled powertools
          else
            dnf config-manager --set-enabled crb
          fi
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          dnf install -y --allowerasing coreutils bash file findutils git boost-devel gtest-devel protobuf-compiler protobuf-devel openssl openssl-devel gmock-devel cryptopp-devel lua-devel cmake gcc-c++ python3-pip rpm-build nodejs python3-devel dbus-devel bash nodejs coreutils procps-ng

      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ inputs.artifact-name }}
          path: .

      # Linux: Install DEB package
      - name: Install DEB package (Linux)
        if: inputs.package-type == 'deb'
        shell: bash
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y python3-protobuf liblua5.3-0 || DEBIAN_FRONTEND=noninteractive apt-get install -y python3-protobuf liblua5.4-0
          DEBIAN_FRONTEND=noninteractive apt-get install -y ./NSCP-${{ inputs.version }}-${{ inputs.distro }}-${{ inputs.distro_version }}-${{ inputs.package-arch }}.deb

      # Linux: Install RPM package
      - name: Install RPM package (Linux)
        if: inputs.package-type == 'rpm'
        shell: /usr/bin/bash {0}
        env:
          PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        run: |
          dnf install -y epel-release || true
          dnf install -y python3-devel python3 python3-protobuf lua 
          dnf install -y ./NSCP-${{ inputs.version }}-${{ inputs.distro }}-${{ inputs.distro_version }}-${{ inputs.package-arch }}.rpm
          nscp settings --load-all --list --add-defaults

      # Linux: Acceptance tests (DEB)
      - name: Acceptance tests (Linux DEB)
        if: inputs.package-type == 'deb'
        run: |
          if [ ! -d /usr/lib/nsclient/scripts ]; then
            echo "ERROR: /usr/lib/nsclient/scripts is missing -- package install failed?" >&2
            exit 1
          fi
          cp -r scripts/* /usr/lib/nsclient/scripts
          nscp nrpe install --certificate --verify none
          ./tests/acceptance-tests.sh

      # Linux: Acceptance tests (RPM)
      - name: Acceptance tests (Linux RPM)
        if: inputs.package-type == 'rpm'
        run: |
          if [ ! -d /usr/lib/nsclient/scripts ]; then
            echo "ERROR: /usr/lib/nsclient/scripts is missing -- package install failed?" >&2
            exit 1
          fi
          cp -r scripts/* /usr/lib/nsclient/scripts
          nscp nrpe install --certificate --verify none
          ./tests/acceptance-tests.sh

      - name: Setup Python for tests
        run: |
          pip3 install --break-system-packages -r build/python/requirements.txt 2>/dev/null || pip3 install -r build/python/requirements.txt

      - name: Run rest tests
        uses: ./.github/actions/rest-test

      - name: Upload diagnostic logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-linux-${{ inputs.distro }}-${{ inputs.distro_version }}-${{ inputs.package-arch }}-logs
          path: |
            /tmp/nsclient.log
            /var/log/nsclient/*.log
            /usr/lib/nsclient/nsclient.ini
            tests/rest/nsclient.ini
          if-no-files-found: ignore
          retention-days: 7

      # TODO: Disabled for now due to issues with docker on windows runners
      #- name: Run NRPE tests
      #  working-directory: tmp/nscp
      #  run: |
      #    ..\..\tests\nrpe\run-test.bat
