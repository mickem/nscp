name: Build Debian package

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      architecture:
        type: string
        description: 'Architecture to build'
        required: true
        default: 'x64'
      version:
        type: string
        description: 'Version to build'
        required: true

env:
  TINY_XML_2_VERSION: "10.1.0"
  MONGOOSE_VERSION: "7.20"
  MINIZ_VERSION: "3.1.1"

jobs:
  build-deb:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            distro_version: "24.04"
            lua_package: liblua5.4-dev
            python_version: python312
            arch: x64
            deb_arch: amd64
            runner: ubuntu-latest
          - distro: ubuntu
            distro_version: "24.04"
            lua_package: liblua5.4-dev
            python_version: python312
            arch: arm64
            deb_arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ${{ matrix.distro }}:${{ matrix.distro_version }}

    steps:
    - name: Install dependencies
      run: |
        # Inline retry helper: package-mirror flakiness on hosted runners makes
        # apt-get update / install fail intermittently. 3 attempts, 5s/10s backoff.
        retry() {
          local n=0
          until "$@"; do
            n=$((n+1))
            if [ $n -ge 3 ]; then echo "::error::Failed after $n attempts: $*" >&2; return 1; fi
            echo "::warning::Attempt $n failed; retrying in $((n*5))s..." >&2
            sleep $((n*5))
          done
        }
        retry apt-get update
        retry env DEBIAN_FRONTEND=noninteractive apt-get install -y git curl unzip libboost-all-dev libgtest-dev protobuf-compiler libprotobuf-dev openssl libssl-dev libgmock-dev libcrypto++-dev ${{ matrix.lua_package }} cmake build-essential python3-pip libdbus-1-dev

    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: web/package-lock.json

    - name: make dirs
      run: |
        mkdir -p tmp/nscp
      shell: bash

    - name: setup python dependencies
      shell: bash
      run: |
        retry() {
          local n=0
          until "$@"; do
            n=$((n+1))
            if [ $n -ge 3 ]; then echo "::error::Failed after $n attempts: $*" >&2; return 1; fi
            echo "::warning::Attempt $n failed; retrying in $((n*5))s..." >&2
            sleep $((n*5))
          done
        }
        if [ "${{ matrix.distro_version }}" = "20.04" ]; then
          retry pip3 install mkdocs protobuf jinja2 mkdocs-material lua-protobuf md-protobuf setuptools
        else
          # Wrap the whole "try break-system-packages, fall back if old pip" expression
          # so a transient PyPI failure retries the *entire* install, not just the fallback.
          retry bash -c 'pip3 install --break-system-packages -r build/python/requirements.txt 2>/dev/null || pip3 install -r build/python/requirements.txt'
        fi

    - id: tinyxml2
      uses: ./.github/actions/tinyxml2
      with:
        version: ${{ env.TINY_XML_2_VERSION }}

    - id: mongoose
      uses: ./.github/actions/mongoose
      with:
        version: ${{ env.MONGOOSE_VERSION }}

    - id: miniz
      uses: ./.github/actions/miniz
      with:
        version: ${{ env.MINIZ_VERSION }}

    - id: build-web
      working-directory: web
      run: |
        npm install
        npm run build

    - name: Write NSClient++ cmake config
      run: |
        cat > tmp/nscp/build.cmake << 'EOF'
        SET(LIBRARY_ROOT_FOLDER "${{ env.GITHUB_WORKSPACE }}")
        SET(NSCP_BOOST_PYTHON_VERSION "${{ matrix.python_version }}")
        SET(TINY_XML2_SOURCE_DIR "${{ steps.tinyxml2.outputs.path_unix }}")
        set(MONGOOSE_SOURCE_DIR "${{ steps.mongoose.outputs.path_unix }}")
        set(MINIZ_INCLUDE_DIR "${{ steps.miniz.outputs.path_unix }}")
        set(CHECK_NSCLIENT_LOCATION "${CMAKE_CURRENT_SOURCE_DIR}")
        set(USE_STATIC_RUNTIME OFF)
        EOF

    - uses: actions/download-artifact@v7
      with:
        name: check_nsclient-linux-${{ matrix.arch }}

    - name: CMake (NSCP)
      working-directory: tmp/nscp
      run: |
        cmake ../.. -D BUILD_VERSION=${{ inputs.version }} -D CPACK_GENERATOR=DEB -DCMAKE_BUILD_TYPE=Release

    - name: Build nsclient
      working-directory: tmp/nscp
      run: |
        make -j$(nproc)

    - name: CPack
      working-directory: tmp/nscp
      run: |
        cpack -G DEB

    - name: rename dist files
      run: |
        mv check_nsclient check_nsclient-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.arch }}
        mv tmp/nscp/NSCP-${{ inputs.version }}-${{ matrix.deb_arch }}.deb NSCP-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.deb_arch }}.deb
      shell: bash

    - name: Test DEB package installation
      run: |
        apt-get install -y ./NSCP-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.deb_arch }}.deb
        nscp settings --load-all --list --add-defaults

    - uses: actions/upload-artifact@v6
      with:
        name: NSCP-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.arch }}
        path: |
          check_nsclient-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.arch }}
          NSCP-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.deb_arch }}.deb
        if-no-files-found: error

    - name: Run tests
      working-directory: tmp/nscp
      run: |
        ctest --output-on-failure -C Release

  integration-tests:
    needs: build-deb
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            distro_version: "24.04"
            arch: x64
            deb_arch: amd64
            runner: ubuntu-latest
          - distro: ubuntu
            distro_version: "24.04"
            arch: arm64
            deb_arch: arm64
            runner: ubuntu-24.04-arm
    uses: ./.github/workflows/integration-tests-linux.yml
    with:
      architecture: ${{ matrix.arch }}
      version: ${{ inputs.version }}
      artifact-name: NSCP-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.arch }}
      package-type: deb
      package-arch: ${{ matrix.deb_arch }}
      container: '${{ matrix.distro }}:${{ matrix.distro_version }}'
      distro: ${{ matrix.distro }}
      distro_version: ${{ matrix.distro_version }}
      runner: ${{ matrix.runner }}
