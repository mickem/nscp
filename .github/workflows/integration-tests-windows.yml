name: Integration Tests (Windows)

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      architecture:
        type: string
        description: 'Architecture to test'
        required: true
        default: 'x64'
      version:
        type: string
        description: 'Version to test'
        required: true
      artifact-name:
        type: string
        description: 'Name of the artifact to download'
        required: true
      platform:
        type: string
        description: 'Platform identifier (e.g., x64, Win32, ubuntu-x64)'
        required: true

env:
  PYTHON_VERSION: 3.11

concurrency:
  group: integration-windows-${{ github.ref }}-${{ inputs.artifact-name }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - id: python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: ${{ inputs.architecture }}
          cache-dependency-path: 'build/python/requirements.txt'
          cache: 'pip'

      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: ${{ inputs.artifact-name }}
          path: .

      - name: Create folders (Windows)
        shell: bash
        run: |
          mkdir -p tmp/nscp
          cd tmp/nscp
          7z x ../../NSCP-${{ inputs.version }}-${{ inputs.platform }}.zip

      - name: Copy test scripts
        working-directory: tmp/nscp
        shell: bash
        run: |
          cp -r ../../scripts/* scripts
          if [ ! -d scripts ]; then
            echo "ERROR: tmp/nscp/scripts is missing -- package extract failed?" >&2
            exit 1
          fi
          find scripts

      - name: Acceptance tests (Windows)
        working-directory: tmp/nscp
        run: |
          ..\..\tests\acceptance-tests.bat --ci

      - name: Run rest tests
        uses: ./.github/actions/rest-test

      # TODO: Disabled for now due to issues with docker on windows runners
      #- name: Run NRPE tests
      #  working-directory: tmp/nscp
      #  run: |
      #    ..\..\tests\nrpe\run-test.bat

      - name: Run installer tests
        if: inputs.architecture == 'x64'
        uses: ./.github/actions/installer-test

      - name: Upload diagnostic logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-windows-${{ inputs.platform }}-logs
          path: |
            tmp/nscp/nsclient.log
            tmp/nscp/*.ini
            tmp/nscp/log/*.log
            tests/rest/nsclient.ini
          if-no-files-found: ignore
          retention-days: 7
