name: Build Rust Client

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      os:
        description: 'Operating System'
        required: true
        type: string
      arch:
        description: 'Architecture'
        required: true
        type: string
      version:
        type: string
        description: 'Version to build'
        required: true
    secrets:
      AZURE_TENANT_ID:
        description: 'Azure tenant ID'
        required: true
      AZURE_CLIENT_ID:
        description: 'Azure client ID'
        required: true
      AZURE_CLIENT_SECRET:
        description: 'Azure client secret'
        required: true

jobs:
  build:
    name: Build ${{ inputs.os }} ${{ inputs.arch }}
    runs-on: ${{ inputs.os }}
    defaults:
      run:
        working-directory: rust/nscp_client

    steps:
      - uses: actions/checkout@v6

      - name: Calculate Target
        id: target
        shell: bash
        run: |
          case "${{ inputs.os }}" in
            windows-*)
              echo "os_name=windows" >> $GITHUB_OUTPUT
              echo "file_ext=.exe" >> $GITHUB_OUTPUT
              case "${{ inputs.arch }}" in
                x64)   echo "triple=x86_64-pc-windows-msvc"   >> $GITHUB_OUTPUT ;;
                x86)   echo "triple=i686-pc-windows-msvc"     >> $GITHUB_OUTPUT ;;
                arm64) echo "triple=aarch64-pc-windows-msvc"  >> $GITHUB_OUTPUT ;;
                *) echo "Unknown windows arch '${{ inputs.arch }}'" ; exit 1 ;;
              esac
              ;;
            ubuntu-*)
              echo "os_name=linux" >> $GITHUB_OUTPUT
              echo "file_ext=" >> $GITHUB_OUTPUT
              # Retry helper: apt mirrors flake on hosted runners. 3 attempts, 5s/10s backoff.
              retry() {
                local n=0
                until "$@"; do
                  n=$((n+1))
                  if [ $n -ge 3 ]; then echo "::error::Failed after $n attempts: $*" >&2; return 1; fi
                  echo "::warning::Attempt $n failed; retrying in $((n*5))s..." >&2
                  sleep $((n*5))
                done
              }
              retry sudo apt-get update
              retry sudo apt-get install -y libdbus-1-dev pkg-config
              case "${{ inputs.arch }}" in
                x64)   echo "triple=x86_64-unknown-linux-gnu"  >> $GITHUB_OUTPUT ;;
                x86)
                  echo "triple=i686-unknown-linux-gnu" >> $GITHUB_OUTPUT
                  retry sudo apt-get install -y gcc-multilib
                  ;;
                arm64) echo "triple=aarch64-unknown-linux-gnu" >> $GITHUB_OUTPUT ;;
                *) echo "Unknown linux arch '${{ inputs.arch }}'" ; exit 1 ;;
              esac
              ;;
            *) echo "Unknown OS '${{ inputs.os }}'" ; exit 1 ;;
          esac

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ steps.target.outputs.triple }}

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            rust/nscp_client/target
          key: ${{ runner.os }}-${{ inputs.arch }}-cargo-${{ hashFiles('rust/nscp_client/Cargo.lock') }}

      - name: Set Version
        shell: bash
        run: sed -i 's/^version = ".*"/version = "${{ inputs.version }}"/' Cargo.toml

      - name: Build
        run: cargo build --release --target ${{ steps.target.outputs.triple }}

      - name: Test
        # Skip running tests when cross-compiling to a target that cannot run on the host
        # (e.g. building aarch64-pc-windows-msvc on an x64 Windows runner produces binaries
        # that fail with "os error 216" when executed).
        if: ${{ !(startsWith(inputs.os, 'windows-') && inputs.arch == 'arm64') && !(startsWith(inputs.os, 'ubuntu-') && inputs.arch == 'arm64') }}
        run: cargo test --release --target ${{ steps.target.outputs.triple }}

      - name: Sign Windows Binary
        if: startsWith(inputs.os, 'windows-')
        uses: azure/trusted-signing-action@v1.0.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://neu.codesigning.azure.net
          trusted-signing-account-name: nsclient
          certificate-profile-name: nsclient
          files: ${{ github.workspace }}/rust/nscp_client/target/${{ steps.target.outputs.triple }}/release/check_nsclient.exe
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: check_nsclient-${{ steps.target.outputs.os_name }}-${{ inputs.arch }}
          path: rust/nscp_client/target/${{ steps.target.outputs.triple }}/release/check_nsclient${{ startsWith(inputs.os, 'windows-') && '.exe' || '' }}
