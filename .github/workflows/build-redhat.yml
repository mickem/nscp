name: Build Linux

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      architecture:
        type: string
        description: 'Architecture to build'
        required: true
        default: 'x64'
      version:
        type: string
        description: 'Version to build'
        required: true

env:
  TINY_XML_2_VERSION: "10.1.0"
  MONGOOSE_VERSION: "7.20"
  MINIZ_VERSION: "3.1.1"

jobs:
  build-rpm:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: rocky
            distro_version: "9"
            python_version: python39
            arch: x64
            rpm_arch: x86_64
            cpack_arch: amd64
            runner: ubuntu-latest
          - distro: rocky
            distro_version: "9"
            python_version: python39
            arch: arm64
            rpm_arch: aarch64
            cpack_arch: arm64
            runner: ubuntu-24.04-arm
          - distro: rocky
            distro_version: "10"
            python_version: python312
            arch: x64
            rpm_arch: x86_64
            cpack_arch: amd64
            runner: ubuntu-latest
          - distro: rocky
            distro_version: "10"
            python_version: python312
            arch: arm64
            rpm_arch: aarch64
            cpack_arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: rockylinux/rockylinux:${{ matrix.distro_version }}
      options: --user root

    steps:
    - name: Install dependencies
      shell: sh
      run: |
        # Inline retry helper: Rocky/EPEL mirrors and the NodeSource setup script
        # are the most common sources of CI flakes for this job. 3 attempts, 5s/10s backoff.
        retry() {
          n=0
          until "$@"; do
            n=$((n+1))
            if [ $n -ge 3 ]; then echo "::error::Failed after $n attempts: $*" >&2; return 1; fi
            echo "::warning::Attempt $n failed; retrying in $((n*5))s..." >&2
            sleep $((n*5))
          done
        }
        retry dnf install -y epel-release
        retry dnf install -y dnf-plugins-core
        if [ "${{ matrix.distro_version }}" = "8" ]; then
          dnf config-manager --set-enabled powertools
        else
          dnf config-manager --set-enabled crb
        fi
        retry dnf update -y
        retry sh -c 'curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -'
        retry dnf install -y --allowerasing coreutils bash file findutils git boost-devel gtest-devel protobuf-compiler protobuf-devel openssl openssl-devel gmock-devel cryptopp-devel lua-devel cmake gcc-c++ python3-pip rpm-build nodejs python3-devel dbus-devel bash
    - uses: actions/checkout@v6

    - name: make dirs
      run: |
        mkdir -p tmp/nscp
      shell: /usr/bin/bash {0}
      env:
        PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    - name: setup python dependencies
      shell: /usr/bin/bash {0}
      run: |
        retry() {
          local n=0
          until "$@"; do
            n=$((n+1))
            if [ $n -ge 3 ]; then echo "::error::Failed after $n attempts: $*" >&2; return 1; fi
            echo "::warning::Attempt $n failed; retrying in $((n*5))s..." >&2
            sleep $((n*5))
          done
        }
        retry bash -c 'pip3 install --break-system-packages -r build/python/requirements.txt 2>/dev/null || pip3 install -r build/python/requirements.txt'
      env:
        PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    - id: tinyxml2
      uses: ./.github/actions/tinyxml2
      with:
        version: ${{ env.TINY_XML_2_VERSION }}

    - id: mongoose
      uses: ./.github/actions/mongoose
      with:
        version: ${{ env.MONGOOSE_VERSION }}

    - id: miniz
      uses: ./.github/actions/miniz
      with:
        version: ${{ env.MINIZ_VERSION }}

    - id: build-web
      working-directory: web
      run: |
        npm install
        npm run build

    - name: Write NSClient++ cmake config
      run: |
        cat > tmp/nscp/build.cmake << 'EOF'
        SET(LIBRARY_ROOT_FOLDER "${{ env.GITHUB_WORKSPACE }}")
        SET(NSCP_BOOST_PYTHON_VERSION "${{ matrix.python_version }}")
        SET(TINY_XML2_SOURCE_DIR "${{ steps.tinyxml2.outputs.path_unix }}")
        set(MONGOOSE_SOURCE_DIR "${{ steps.mongoose.outputs.path_unix }}")
        set(MINIZ_INCLUDE_DIR "${{ steps.miniz.outputs.path_unix }}")
        set(CHECK_NSCLIENT_LOCATION "${CMAKE_CURRENT_SOURCE_DIR}")
        set(USE_STATIC_RUNTIME OFF)
        EOF

    - uses: actions/download-artifact@v7
      with:
        name: check_nsclient-linux-${{ matrix.arch }}

    - name: CMake (NSCP)
      working-directory: tmp/nscp
      run: |
        cmake ../.. -D BUILD_VERSION=${{ inputs.version }} -D CPACK_GENERATOR=RPM -DCMAKE_BUILD_TYPE=Release

    - name: Build nsclient
      working-directory: tmp/nscp
      run: |
        make -j$(nproc)

    - name: CPack
      working-directory: tmp/nscp
      run: |
        cpack -G RPM

    - name: rename dist files
      run: |
        mv check_nsclient check_nsclient-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.arch }}
        mv tmp/nscp/NSCP-${{ inputs.version }}-${{ matrix.cpack_arch }}.rpm NSCP-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.rpm_arch }}.rpm
      shell: /usr/bin/bash {0}
      env:
        PATH: /usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    - name: Test RPM package installation
      run: |
        dnf install -y ./NSCP-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.rpm_arch }}.rpm
        nscp settings --load-all --list --add-defaults

    - uses: actions/upload-artifact@v6
      with:
        name: NSCP-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.arch }}
        path: |
          check_nsclient-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.arch }}
          NSCP-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.rpm_arch }}.rpm
        if-no-files-found: error

    - name: Run tests
      working-directory: tmp/nscp
      run: |
        ctest --output-on-failure -C Release

  integration-tests:
    needs: build-rpm
    strategy:
      fail-fast: false
      matrix:
        include:
          # Disabled as python 3.9 does not support type annotations in some of the test code
          #- distro: rocky
          #  distro_version: "9"
          #  arch: x64
          #  rpm_arch: x86_64
          #  runner: ubuntu-latest
          #- distro: rocky
          #  distro_version: "9"
          #  arch: arm64
          #  rpm_arch: aarch64
          #  runner: ubuntu-24.04-arm
          - distro: rocky
            distro_version: "10"
            arch: x64
            rpm_arch: x86_64
            runner: ubuntu-latest
          - distro: rocky
            distro_version: "10"
            arch: arm64
            rpm_arch: aarch64
            runner: ubuntu-24.04-arm
    uses: ./.github/workflows/integration-tests-linux.yml
    with:
      architecture: ${{ matrix.arch }}
      version: ${{ inputs.version }}
      artifact-name: NSCP-${{ inputs.version }}-${{ matrix.distro }}-${{ matrix.distro_version }}-${{ matrix.arch }}
      package-type: rpm
      package-arch: ${{ matrix.rpm_arch }}
      container: 'rockylinux/rockylinux:${{ matrix.distro_version }}'
      distro: ${{ matrix.distro }}
      distro_version: ${{ matrix.distro_version }}
      runner: ${{ matrix.runner }}
